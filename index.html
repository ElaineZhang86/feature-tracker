// ═══════════════════════════════════════════════════════════════
//  CUSTOM FEATURES (stored in localStorage)
// ═══════════════════════════════════════════════════════════════
function loadCustomFeatures() {
  try { return JSON.parse(localStorage.getItem('fh_custom_features') || '[]'); }
  catch { return []; }
}

function saveCustomFeatures(features) {
  localStorage.setItem('fh_custom_features', JSON.stringify(features));
}

function getAllFeatures() {
  return [...FEATURES, ...loadCustomFeatures()];
}

// ═══════════════════════════════════════════════════════════════
//  STATE (persisted in localStorage)
// ═══════════════════════════════════════════════════════════════
function loadState() {
  try { return JSON.parse(localStorage.getItem('fh_state') || '{}'); }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem('fh_state', JSON.stringify(state));
  document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  });
  showToast();
}

let STATE = loadState();

function getFeatureState(id) {
  return STATE[id] || {};
}

function updateFeatureState(id, patch) {
  STATE[id] = { ...getFeatureState(id), ...patch };
  saveState(STATE);
}

function getChecked(featureId) {
  return getFeatureState(featureId).checked || {};
}

function setChecked(featureId, index, value) {
  const checked = { ...getChecked(featureId), [index]: value };
  updateFeatureState(featureId, { checked });
}

function getCurrentStep(featureId, fallback) {
  return getFeatureState(featureId).currentStep ?? fallback;
}

function setCurrentStep(featureId, value) {
  updateFeatureState(featureId, { currentStep: value });
}

function getNotes(featureId) {
  return getFeatureState(featureId).notes || '';
}

function setNotes(featureId, value) {
  updateFeatureState(featureId, { notes: value });
}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2);
}

function progressOf(feature) {
  const custom = getFeatureState(feature.id).customTodo || [];
  const total = feature.todo.length + custom.length;
  if (!total) return 100;
  const checked = getChecked(feature.id);
  const done = [...feature.todo, ...custom].filter((_, i) => checked[i]).length;
  return Math.round((done / total) * 100);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ═══════════════════════════════════════════════════════════════
//  VIEW SWITCHING
// ═══════════════════════════════════════════════════════════════
function showView(id, navEl) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const view = document.getElementById('view-' + id);
  if (view) view.classList.add('active');
  if (navEl) navEl.classList.add('active');
}

function showFeature(id) {
  const navEl = document.querySelector(`[data-feature="${id}"]`);
  showView(id, navEl);
  renderScheduleCards(); // refresh progress
}

// ═══════════════════════════════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════════════════════════════
function renderSidebar() {
  const container = document.getElementById('nav-features');
  container.innerHTML = getAllFeatures().map(f => `
    <div class="nav-item" data-feature="${f.id}" onclick="showFeature('${f.id}')">
      <span class="nav-icon material-symbols-rounded">${f.icon}</span>
      <span class="nav-label">${f.title}</span>
      <span class="badge nav-badge ${STATUS_BADGE[getStatus(f)] || 'badge-done'}">${getStatus(f)}</span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════
//  RENDER SCHEDULE CARDS
// ═══════════════════════════════════════════════════════════════
function renderScheduleCards() {
  const grid = document.getElementById('schedule-grid');
  grid.innerHTML = getAllFeatures().map(f => {
    const status = getStatus(f);
    const due = getDue(f);
    const pct = progressOf(f);
    const total = f.todo.length + (getFeatureState(f.id).customTodo || []).length;
    const doneCount = Math.round(pct * total / 100);
    return `
    <div class="schedule-card" onclick="showFeature('${f.id}')">
      <div class="sc-top">
        <div class="sc-title"><span class="material-symbols-rounded sc-icon">${f.icon}</span>${f.title}</div>
        <span class="badge ${STATUS_BADGE[status] || 'badge-done'}">${status}</span>
      </div>
      <div class="sc-meta">
        ${f.customer !== 'TBD' ? `<strong>${f.customer}</strong> · ` : ''}Due: ${due}
      </div>
      <div class="sc-focus">${getCurrentStep(f.id, f.currentFocus)}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="sc-tasks">
        <span>${doneCount} / ${total} tasks done</span>
        <span>${pct}%</span>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  RENDER FEATURE DETAIL
// ═══════════════════════════════════════════════════════════════
function renderFeatureViews() {
  const container = document.getElementById('feature-views');
  container.innerHTML = getAllFeatures().map(f => buildFeatureView(f)).join('');
}

function buildFeatureView(f) {
  const currentStep = getCurrentStep(f.id, f.currentFocus);
  const status = getStatus(f);
  const due = getDue(f);


  return `
  <div id="view-${f.id}" class="view">
    <!-- HEADER -->
    <div class="feature-header">
      <div class="feature-title-block">
        <h2><span class="material-symbols-rounded" style="font-size:20px;vertical-align:middle;margin-right:8px;opacity:.8">${f.icon}</span>${f.title}</h2>
        <div class="feature-meta-row">
          <select id="${f.id}_status_sel"
            class="status-select ${STATUS_BADGE[status] || 'badge-done'}"
            onchange="handleStatusChange('${f.id}', this.value)">
            ${['Discovery','Design','Dev','QA','Done'].map(s =>
              `<option value="${s}" ${status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <span class="meta-sep">|</span>
          <span class="meta-customer">${f.customer}</span>
          <span class="meta-sep">|</span>
          <span>Due: <input class="due-input" value="${due}"
            onchange="handleDueChange('${f.id}', this.value)"
            onblur="handleDueChange('${f.id}', this.value)" /></span>
        </div>
      </div>
      ${f.isCustom ? `<div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn" style="display:flex;align-items:center;gap:5px" onclick="openEditFeatureModal('${f.id}')">
          <span class="material-symbols-rounded" style="font-size:15px">edit</span> Edit Info
        </button>
        <button class="btn" style="border-color:var(--red);color:var(--red);display:flex;align-items:center;gap:5px" onclick="deleteCustomFeature('${f.id}')">
          <span class="material-symbols-rounded" style="font-size:15px">delete</span> Delete
        </button>
      </div>` : ''}
    </div>

    <!-- CURRENT FOCUS RIBBON -->
    <div class="focus-ribbon">
      <div class="focus-ribbon-icon"><span class="material-symbols-rounded" style="font-size:22px">my_location</span></div>
      <div class="focus-ribbon-text">
        <strong>Current Focus</strong>
        <span id="${f.id}_step_display">${currentStep}</span>
      </div>
      <button class="btn" onclick="toggleStepEdit('${f.id}')">Edit</button>
    </div>
    <div id="${f.id}_step_editor" style="display:none;margin-bottom:20px;">
      <div class="current-step-wrapper">
        <textarea class="editable-note" id="${f.id}_step_input"
          placeholder="What are you working on right now?">${currentStep}</textarea>
        <button class="btn btn-primary" onclick="saveStep('${f.id}')">Save</button>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('${f.id}', 'context', this)">Context</div>
      <div class="tab" onclick="switchTab('${f.id}', 'dknowledge', this)">Domain Knowledge</div>
      <div class="tab" onclick="switchTab('${f.id}', 'calls', this)">Customer Context</div>
      ${f.hasDomainDoc ? `<div class="tab" onclick="switchTab('${f.id}', 'ddocs', this)">Feature Brief</div>` : ''}
      ${f.hasDoc && f.docLabel !== 'Design Spec' ? `<div class="tab" onclick="switchTab('${f.id}', 'docs', this)">${f.docLabel === 'Feature Understanding' ? 'Feature Brief' : (f.docLabel || 'Docs')}</div>` : ''}
      <div class="tab" onclick="switchTab('${f.id}', 'questions', this)">Q&amp;A</div>
      <div class="tab" onclick="switchTab('${f.id}', 'spec', this)">Design Spec</div>
      <div class="tab" onclick="switchTab('${f.id}', 'design', this)">Design Files</div>
      <div class="tab" onclick="switchTab('${f.id}', 'notes', this)">Notes</div>
      <div class="tab" onclick="switchTab('${f.id}', 'todo', this)">Next Tasks</div>
      <div class="tab" onclick="switchTab('${f.id}', 'done', this)">Completed</div>
    </div>

    <!-- CONTEXT TAB -->
    <div id="${f.id}_tab_context" class="tab-panel active">
      ${buildContextTabHtml(f)}
    </div>

    <!-- TODO TAB -->
    <div id="${f.id}_tab_todo" class="tab-panel">
      <div id="${f.id}_todo_panel"></div>
    </div>

    <!-- DONE TAB -->
    <div id="${f.id}_tab_done" class="tab-panel">
      <div id="${f.id}_done_panel"></div>
    </div>

    <!-- QUESTIONS TAB -->
    <div id="${f.id}_tab_questions" class="tab-panel">
      <div id="${f.id}_q_panel"></div>
    </div>

    <!-- NOTES TAB -->
    <div id="${f.id}_tab_notes" class="tab-panel">
      <div id="${f.id}_notes_panel"></div>
    </div>

    <!-- DESIGN TAB -->
    <div id="${f.id}_tab_design" class="tab-panel">
      <div id="${f.id}_design_panel"></div>
    </div>

    <!-- DESIGN SPEC TAB -->
    <div id="${f.id}_tab_spec" class="tab-panel">
      <div id="${f.id}_spec_panel"></div>
    </div>

    <!-- DOCS TAB -->
    ${f.hasDoc ? `
    <div id="${f.id}_tab_docs" class="tab-panel">
      <div id="${f.id}_docs_view"></div>
    </div>` : ''}

    <!-- DOMAIN DOCS TAB -->
    ${f.hasDomainDoc ? `
    <div id="${f.id}_tab_ddocs" class="tab-panel">
      <div id="${f.id}_ddocs_view"></div>
    </div>` : ''}

    <!-- DOMAIN KNOWLEDGE TAB -->
    <div id="${f.id}_tab_dknowledge" class="tab-panel">
      <div id="${f.id}_dk_panel"></div>
    </div>

    <!-- CUSTOMER CALLS TAB -->
    <div id="${f.id}_tab_calls" class="tab-panel">
      <div id="${f.id}_calls_list"></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTIVITY
// ═══════════════════════════════════════════════════════════════
function switchTab(featureId, tabName, el) {
  const allTabs = el.closest('.tabs').querySelectorAll('.tab');
  allTabs.forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const panels = ['context','todo','done','questions','notes','design','spec','docs','ddocs','dknowledge','calls'];
  panels.forEach(p => {
    const panel = document.getElementById(`${featureId}_tab_${p}`);
    if (panel) panel.classList.toggle('active', p === tabName);
  });
}

function handleCheck(featureId, index, value) {
  setChecked(featureId, index, value);
  const label = document.querySelector(`label[for="${featureId}_todo_${index}"]`);
  if (label) label.classList.toggle('done', value);
  renderScheduleCards();
}

function handleNotes(featureId, value) {
  setNotes(featureId, value);
}

function toggleStepEdit(featureId) {
  const editor = document.getElementById(`${featureId}_step_editor`);
  const isHidden = editor.style.display === 'none';
  editor.style.display = isHidden ? 'block' : 'none';
  if (isHidden) document.getElementById(`${featureId}_step_input`).focus();
}

function saveStep(featureId) {
  const val = document.getElementById(`${featureId}_step_input`).value.trim();
  if (!val) return;
  setCurrentStep(featureId, val);
  document.getElementById(`${featureId}_step_display`).textContent = val;
  document.getElementById(`${featureId}_step_editor`).style.display = 'none';
  renderScheduleCards();
}

// ═══════════════════════════════════════════════════════════════
//  DYNAMIC STATE HELPERS
// ═══════════════════════════════════════════════════════════════
function getStatus(f) { return getFeatureState(f.id).status || f.status; }
function getDue(f)    { return getFeatureState(f.id).due    || f.due;    }

function handleStatusChange(featureId, val) {
  updateFeatureState(featureId, { status: val });
  const sel = document.getElementById(`${featureId}_status_sel`);
  if (sel) sel.className = `status-select ${STATUS_BADGE[val] || 'badge-done'}`;
  const navBadge = document.querySelector(`[data-feature="${featureId}"] .nav-badge`);
  if (navBadge) { navBadge.className = `badge nav-badge ${STATUS_BADGE[val] || 'badge-done'}`; navBadge.textContent = val; }
  renderScheduleCards();
}

function handleDueChange(featureId, val) {
  updateFeatureState(featureId, { due: val || 'TBD' });
  renderScheduleCards();
}

// ── TODO ──────────────────────────────────────────────────────
const _todoFormActive = {};
function renderTodoList(featureId) {
  const f = getAllFeatures().find(x => x.id === featureId);
  const panel = document.getElementById(`${featureId}_todo_panel`);
  if (!f || !panel) return;
  const checked = getChecked(featureId);
  const custom = getFeatureState(featureId).customTodo || [];
  const base = f.todo.map((item, i) => {
    const done = !!checked[i];
    return `<li class="check-item">
      <input type="checkbox" id="${featureId}_td_${i}" ${done?'checked':''} onchange="handleCheck('${featureId}',${i},this.checked)"/>
      <label class="check-label${done?' done':''}" for="${featureId}_td_${i}">${item}</label>
    </li>`;
  }).join('');
  const offset = f.todo.length;
  const extra = custom.map((item, i) => {
    const idx = offset + i; const done = !!checked[idx];
    return `<li class="check-item">
      <input type="checkbox" id="${featureId}_td_${idx}" ${done?'checked':''} onchange="handleCheck('${featureId}',${idx},this.checked)"/>
      <label class="check-label${done?' done':''}" for="${featureId}_td_${idx}">${item}</label>
      <button class="remove-btn" title="Remove" onclick="removeCustomTodo('${featureId}',${i})"><span class="material-symbols-rounded">delete</span></button>
    </li>`;
  }).join('');
  const items = base + extra;

  if (!items && !_todoFormActive[featureId]) {
    panel.innerHTML = `
      <div class="context-card" style="text-align:center;padding:48px 20px">
        <span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim);display:block;margin-bottom:10px">pending_actions</span>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">No tasks yet.<br>Add what still needs to be designed or decided.</div>
        <button class="btn btn-primary" style="font-size:12px;padding:6px 16px" onclick="addTodo('${featureId}')">+ Add Task</button>
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Next Tasks</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">Design and decision tasks remaining</div>
      </div>
      <button class="btn btn-primary" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;flex-shrink:0" onclick="document.getElementById('${featureId}_add_todo').focus()">
        <span class="material-symbols-rounded" style="font-size:14px">add</span> Add Task
      </button>
    </div>
    <div class="context-card">
      <ul class="checklist" id="${featureId}_todo_list">${items}</ul>
      <div class="add-item-row" style="margin-top:12px">
        <input class="add-item-input" id="${featureId}_add_todo" placeholder="Add a task…"
          onkeydown="if(event.key==='Enter')addTodo('${featureId}')" />
        <button class="btn btn-primary" onclick="addTodo('${featureId}')">Add</button>
      </div>
    </div>`;
}

function addTodo(featureId) {
  let inp = document.getElementById(`${featureId}_add_todo`);
  if (!inp) {
    _todoFormActive[featureId] = true;
    renderTodoList(featureId);
    inp = document.getElementById(`${featureId}_add_todo`);
    if (inp) inp.focus();
    return;
  }
  const text = inp.value.trim(); if (!text) return;
  const items = [...(getFeatureState(featureId).customTodo || []), text];
  updateFeatureState(featureId, { customTodo: items }); inp.value = '';
  renderTodoList(featureId); renderScheduleCards();
}

function removeCustomTodo(featureId, i) {
  const items = (getFeatureState(featureId).customTodo || []).filter((_,j) => j !== i);
  updateFeatureState(featureId, { customTodo: items });
  renderTodoList(featureId); renderScheduleCards();
}

// ── DONE ──────────────────────────────────────────────────────
const _doneFormActive = {};
function renderDoneList(featureId) {
  const f = getAllFeatures().find(x => x.id === featureId);
  const panel = document.getElementById(`${featureId}_done_panel`);
  if (!f || !panel) return;
  const custom = getFeatureState(featureId).customDone || [];
  const base = f.done.map(d => `<li class="done-item"><span>${d}</span></li>`).join('');
  const extra = custom.map((item, i) => `<li class="done-item" style="justify-content:space-between">
    <span>${item}</span><button class="remove-btn" title="Remove" onclick="removeCustomDone('${featureId}',${i})"><span class="material-symbols-rounded">delete</span></button>
  </li>`).join('');
  const items = base + extra;

  if (!items && !_doneFormActive[featureId]) {
    panel.innerHTML = `
      <div class="context-card" style="text-align:center;padding:48px 20px">
        <span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim);display:block;margin-bottom:10px">check_circle</span>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Nothing completed yet.<br>Add items you've already finished to track progress.</div>
        <button class="btn btn-primary" style="font-size:12px;padding:6px 16px" onclick="addDone('${featureId}')">+ Add Item</button>
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Completed</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">Work already finished</div>
      </div>
      <button class="btn btn-primary" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;flex-shrink:0" onclick="document.getElementById('${featureId}_add_done').focus()">
        <span class="material-symbols-rounded" style="font-size:14px">add</span> Add Item
      </button>
    </div>
    <div class="context-card">
      <ul class="done-list" id="${featureId}_done_list">${items}</ul>
      <div class="add-item-row" style="margin-top:12px">
        <input class="add-item-input" id="${featureId}_add_done" placeholder="Add a completed item…"
          onkeydown="if(event.key==='Enter')addDone('${featureId}')" />
        <button class="btn btn-primary" onclick="addDone('${featureId}')">Add</button>
      </div>
    </div>`;
}

function addDone(featureId) {
  let inp = document.getElementById(`${featureId}_add_done`);
  if (!inp) {
    _doneFormActive[featureId] = true;
    renderDoneList(featureId);
    inp = document.getElementById(`${featureId}_add_done`);
    if (inp) inp.focus();
    return;
  }
  const text = inp.value.trim(); if (!text) return;
  const items = [...(getFeatureState(featureId).customDone || []), text];
  updateFeatureState(featureId, { customDone: items }); inp.value = '';
  renderDoneList(featureId);
}

function removeCustomDone(featureId, i) {
  const items = (getFeatureState(featureId).customDone || []).filter((_,j) => j !== i);
  updateFeatureState(featureId, { customDone: items });
  renderDoneList(featureId);
}

// ── QUESTIONS ─────────────────────────────────────────────────
function autoResizeQText(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

const _qFormActive = {};
function renderQuestionsList(featureId) {
  const f = getAllFeatures().find(x => x.id === featureId);
  const panel = document.getElementById(`${featureId}_q_panel`);
  if (!f || !panel) return;
  const st = getFeatureState(featureId);
  const resolvedBase = st.resolvedBase || {};
  const resolvedCustom = st.resolvedCustom || {};
  const custom = st.customQuestions || [];
  const deletedBase = st.deletedBase || {};
  const answers = st.questionAnswers || {};
  const attachments = st.qAttachments || {};

  function answerBlock(key) {
    const ans = answers[key] || '';
    const isEditing = !!_answerEditMode[`${featureId}_${key}`];

    if (!ans && !isEditing) {
      return `<div class="q-answer-section">
        <button class="q-add-answer-btn" onclick="openAnswerEdit('${featureId}','${key}')">
          <span class="material-symbols-rounded">add_comment</span> Add answer…
        </button>
      </div>`;
    }

    if (isEditing) {
      return `<div class="q-answer-section">
        <div class="q-answer-header" style="margin-bottom:6px">
          <span class="q-answer-label"><span class="material-symbols-rounded" style="font-size:12px">question_answer</span> Answer</span>
        </div>
        <textarea class="q-answer-input" id="qa_input_${featureId}_${key}"
          placeholder="Type your answer… (markdown supported)"
          autofocus>${escHtml(ans)}</textarea>
        <div class="q-answer-editor-acts">
          <button class="btn btn-primary" style="font-size:12px;padding:5px 12px"
            onclick="saveAnswerFromEditor('${featureId}','${key}')">Save</button>
          <button class="btn" style="font-size:12px;padding:5px 12px"
            onclick="closeAnswerEdit('${featureId}','${key}')">${ans ? 'Cancel' : 'Discard'}</button>
        </div>
      </div>`;
    }

    // Has answer, not editing
    return `<div class="q-answer-section">
      <div class="q-answer-card">
        <div class="q-answer-card-header">
          <span class="q-answer-label"><span class="material-symbols-rounded" style="font-size:12px">question_answer</span> Answer</span>
          <div class="q-answer-acts">
            <button class="q-icon-btn" title="Edit answer" onclick="openAnswerEdit('${featureId}','${key}')">
              <span class="material-symbols-rounded">edit</span>
            </button>
            <button class="q-icon-btn del" title="Delete answer" onclick="deleteAnswer('${featureId}','${key}')">
              <span class="material-symbols-rounded">delete</span>
            </button>
          </div>
        </div>
        <div class="q-answer-display">${typeof marked !== 'undefined' ? marked.parse(ans) : escHtml(ans)}</div>
      </div>
    </div>`;
  }

  function attachBlock(key) {
    const items = attachments[key] || [];
    if (!items.length) return `<div class="q-attachments" id="qa_attach_${featureId}_${key}"></div>`;
    const chips = items.map(a => {
      if (a.type === 'image') {
        return '<div class="q-attach-img-wrap"><img class="q-attach-img" src="' + escHtml(a.url) + '" onclick="window.open(\'' + escHtml(a.url) + '\',\'_blank\')" onerror="this.parentElement.style.display=\'none\'" /><button class="q-attach-img-remove" title="Remove" onclick="removeQAttachment(\'' + featureId + '\',\'' + key + '\',\'' + a.id + '\')"><span class="material-symbols-rounded">close</span></button></div>';
      }
      const label = a.url.length > 52 ? a.url.slice(0, 52) + '\u2026' : a.url;
      return '<a class="q-attach-chip" href="' + escHtml(a.url) + '" target="_blank"><span class="material-symbols-rounded" style="font-size:12px">open_in_new</span><span class="chip-label">' + escHtml(label) + '</span><button class="chip-remove" title="Remove" onclick="event.preventDefault();removeQAttachment(\'' + featureId + '\',\'' + key + '\',\'' + a.id + '\')"><span class="material-symbols-rounded">close</span></button></a>';
    }).join('');
    return `<div class="q-attachments" id="qa_attach_${featureId}_${key}">${chips}</div>`;
  }

  function buildCard(q, key, type, idx, res, resolveCmd, deleteCmd) {
    const displayText = (type === 'base' && st.editedBase && st.editedBase[idx] !== undefined) ? st.editedBase[idx] : q;
    return `<div class="question-card${res ? ' q-resolved' : ''}">
      <div class="q-header">
        <textarea class="q-text" id="q_text_${featureId}_${key}"
          onblur="saveQuestionText('${featureId}','${type}',${idx},this.value)"
          oninput="autoResizeQText(this)">${escHtml(displayText)}</textarea>
        <div class="q-acts">
          <button class="q-icon-btn${res ? ' resolved' : ''}" title="${res ? 'Reopen' : 'Resolve'}" onclick="${resolveCmd}">
            <span class="material-symbols-rounded">${res ? 'undo' : 'check_circle'}</span>
          </button>
          <button class="q-icon-btn" id="q_attachbtn_${featureId}_${key}" title="Attach" onclick="toggleQAttach('${featureId}','${key}')">
            <span class="material-symbols-rounded">attach_file</span>
          </button>
          <button class="q-icon-btn del" title="Delete" onclick="${deleteCmd}">
            <span class="material-symbols-rounded">delete</span>
          </button>
        </div>
      </div>
      ${attachBlock(key)}
      ${answerBlock(key)}
      <div class="q-attach-row" id="q_attachrow_${featureId}_${key}">
        <input id="q_attachurl_${featureId}_${key}"
          placeholder="Paste URL or Ctrl+V to paste screenshot…"
          onkeydown="if(event.key==='Enter')addQAttachment('${featureId}','${key}')"
          onpaste="handleQAttachPaste(event,'${featureId}','${key}')" />
        <button class="btn btn-primary" style="white-space:nowrap;font-size:11px;padding:5px 10px"
          onclick="addQAttachment('${featureId}','${key}')">Add</button>
      </div>
      <div class="q-paste-hint" id="q_pastehint_${featureId}_${key}" style="display:none">
        <span class="material-symbols-rounded">image</span> Screenshot pasted — saved above
      </div>
    </div>`;
  }

  const baseHtml = f.questions.map((q, i) => {
    if (deletedBase[i]) return '';
    const res = !!resolvedBase[i];
    const key = 'base_' + i;
    const resolveCmd = res ? `unresolveQ('${featureId}','base',${i})` : `resolveQ('${featureId}','base',${i})`;
    return buildCard(q, key, 'base', i, res, resolveCmd, `deleteBaseQ('${featureId}',${i})`);
  }).join('');

  const customHtml = custom.map((q, i) => {
    const res = !!resolvedCustom[i];
    const key = 'custom_' + i;
    const resolveCmd = res ? `unresolveQ('${featureId}','custom',${i})` : `resolveQ('${featureId}','custom',${i})`;
    return buildCard(q, key, 'custom', i, res, resolveCmd, `removeCustomQ('${featureId}',${i})`);
  }).join('');

  // ── Deleted section ──────────────────────────────
  const deletedBaseItems = f.questions.map((q, i) => {
    if (!deletedBase[i]) return '';
    const displayText = (st.editedBase && st.editedBase[i] !== undefined) ? st.editedBase[i] : q;
    return `<div class="deleted-q-item">
      <span class="deleted-q-text">${escHtml(displayText)}</span>
      <button class="restore-btn" onclick="restoreBaseQ('${featureId}',${i})">
        <span class="material-symbols-rounded">undo</span> Restore
      </button>
    </div>`;
  }).join('');

  const deletedCustomItems = (st.deletedCustomQuestions || []).map(d =>
    `<div class="deleted-q-item">
      <span class="deleted-q-text">${escHtml(d.text)}</span>
      <button class="restore-btn" onclick="restoreCustomQ('${featureId}','${d.id}')">
        <span class="material-symbols-rounded">undo</span> Restore
      </button>
    </div>`
  ).join('');

  const deletedHtml = deletedBaseItems + deletedCustomItems;
  const deletedSection = deletedHtml ? `
    <button class="deleted-q-toggle" id="${featureId}_deleted_q_btn" onclick="toggleDeletedQ('${featureId}')">
      <span class="material-symbols-rounded">expand_more</span>
      ${(Object.values(deletedBase).filter(Boolean).length + (st.deletedCustomQuestions || []).length)} deleted question(s) — click to restore
    </button>
    <div id="${featureId}_deleted_q_list" style="display:none">${deletedHtml}</div>` : '';

  const content = baseHtml + customHtml;

  if (!content && !_qFormActive[featureId]) {
    panel.innerHTML = `

function deleteBaseQ(featureId, i) {

}

// Answer edit mode state (in-memory, resets on page reload — answers persist in localStorage)
const _answerEditMode = {};

function openAnswerEdit(featureId, key) {
  _answerEditMode[`${featureId}_${key}`] = true;
  renderQuestionsList(featureId);
  setTimeout(() => {
    const ta = document.getElementById(`qa_input_${featureId}_${key}`);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 30);
}

function closeAnswerEdit(featureId, key) {
  delete _answerEditMode[`${featureId}_${key}`];
  renderQuestionsList(featureId);
}

function saveAnswerFromEditor(featureId, key) {
  const ta = document.getElementById(`qa_input_${featureId}_${key}`);
  if (!ta) return;
  const val = ta.value.trim();
  delete _answerEditMode[`${featureId}_${key}`];
  const answers = { ...(getFeatureState(featureId).questionAnswers || {}), [key]: val };
  if (!val) delete answers[key];
  updateFeatureState(featureId, { questionAnswers: answers });
  renderQuestionsList(featureId);
}

function saveAnswer(featureId, key, value) {
  const answers = { ...(getFeatureState(featureId).questionAnswers || {}), [key]: value };
  updateFeatureState(featureId, { questionAnswers: answers });
}

function deleteAnswer(featureId, key) {
  delete _answerEditMode[`${featureId}_${key}`];
  const answers = { ...(getFeatureState(featureId).questionAnswers || {}) };
  delete answers[key];
  updateFeatureState(featureId, { questionAnswers: answers });
  renderQuestionsList(featureId);
}

function handleQAttachPaste(event, featureId, key) {
  const items = event.clipboardData && event.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      event.preventDefault();
      const blob = item.getAsFile();
      if (!blob) continue;
      const reader = new FileReader();
      reader.onload = (e) => {
        const url = e.target.result; // data URL
        const existing = getQAttachments(featureId);
        const newA = { id: Date.now().toString(), url, type: 'image' };
        const updated = { ...existing, [key]: [...(existing[key] || []), newA] };
        updateFeatureState(featureId, { qAttachments: updated });
        renderQuestionsList(featureId);
        // Show brief hint
        const hint = document.getElementById(`q_pastehint_${featureId}_${key}`);
        if (hint) {
          hint.style.display = 'flex';
          setTimeout(() => { hint.style.display = 'none'; }, 2500);
        }
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

function resolveQ(featureId, type, i) {
  const key = type === 'base' ? 'resolvedBase' : 'resolvedCustom';
  const r = { ...(getFeatureState(featureId)[key] || {}), [i]: true };
  updateFeatureState(featureId, { [key]: r }); renderQuestionsList(featureId);
}
function unresolveQ(featureId, type, i) {
  const key = type === 'base' ? 'resolvedBase' : 'resolvedCustom';
  const r = { ...(getFeatureState(featureId)[key] || {}) }; delete r[i];
  updateFeatureState(featureId, { [key]: r }); renderQuestionsList(featureId);
}
function addQuestion(featureId) {
  let inp = document.getElementById(`${featureId}_add_q`);
  if (!inp) {
    _qFormActive[featureId] = true;
    renderQuestionsList(featureId);
    inp = document.getElementById(`${featureId}_add_q`);
    if (inp) inp.focus();
    return;
  }
  const text = inp.value.trim(); if (!text) return;
  const items = [...(getFeatureState(featureId).customQuestions || []), text];
  updateFeatureState(featureId, { customQuestions: items }); inp.value = '';
  renderQuestionsList(featureId);
}
function removeCustomQ(featureId, i) {
  const st = getFeatureState(featureId);
  const items = st.customQuestions || [];
  const text = items[i];
  if (!text) return;
  const remaining = items.filter((_, j) => j !== i);
  const deleted = [...(st.deletedCustomQuestions || []), { id: Date.now().toString(), text }];
  updateFeatureState(featureId, { customQuestions: remaining, deletedCustomQuestions: deleted });
  renderQuestionsList(featureId);
}

function restoreBaseQ(featureId, i) {
  const del = { ...(getFeatureState(featureId).deletedBase || {}) };
  delete del[i];
  updateFeatureState(featureId, { deletedBase: del });
  renderQuestionsList(featureId);
}

function restoreCustomQ(featureId, id) {
  const st = getFeatureState(featureId);
  const deletedCustom = st.deletedCustomQuestions || [];
  const item = deletedCustom.find(d => d.id === id);
  if (!item) return;
  const remaining = deletedCustom.filter(d => d.id !== id);
  const customQuestions = [...(st.customQuestions || []), item.text];
  updateFeatureState(featureId, { deletedCustomQuestions: remaining, customQuestions });
  renderQuestionsList(featureId);
}

function toggleDeletedQ(featureId) {
  const list = document.getElementById(`${featureId}_deleted_q_list`);
  const btn = document.getElementById(`${featureId}_deleted_q_btn`);
  if (!list) return;
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'block';
  if (btn) {
    const icon = btn.querySelector('.material-symbols-rounded');
    if (icon) icon.textContent = open ? 'expand_more' : 'expand_less';
  }
}

function saveQuestionText(featureId, type, idx, value) {
  if (!value.trim()) return;
  if (type === 'base') {
    const editedBase = { ...(getFeatureState(featureId).editedBase || {}), [idx]: value };
    updateFeatureState(featureId, { editedBase });
  } else {
    const items = (getFeatureState(featureId).customQuestions || []).map((q, i) => i === idx ? value : q);
    updateFeatureState(featureId, { customQuestions: items });
  }
}

function getQAttachments(featureId) {
  return getFeatureState(featureId).qAttachments || {};
}

function toggleQAttach(featureId, key) {
  const row = document.getElementById(`q_attachrow_${featureId}_${key}`);
  const btn = document.getElementById(`q_attachbtn_${featureId}_${key}`);
  if (!row) return;
  row.classList.toggle('open');
  if (btn) btn.classList.toggle('attach-active', row.classList.contains('open'));
  if (row.classList.contains('open')) {
    const inp = document.getElementById(`q_attachurl_${featureId}_${key}`);
    if (inp) inp.focus();
  }
}

function addQAttachment(featureId, key) {
  const inp = document.getElementById(`q_attachurl_${featureId}_${key}`);
  const url = inp ? inp.value.trim() : '';
  if (!url) return;
  const existing = getQAttachments(featureId);
  const isImage = /\.(png|jpg|jpeg|gif|webp|svg)(\?.*)?$/i.test(url);
  const newA = { id: Date.now().toString(), url, type: isImage ? 'image' : 'link' };
  const updated = { ...existing, [key]: [...(existing[key] || []), newA] };
  updateFeatureState(featureId, { qAttachments: updated });
  if (inp) inp.value = '';
  renderQuestionsList(featureId);
}

function removeQAttachment(featureId, key, attachId) {
  const existing = getQAttachments(featureId);
  const updated = { ...existing, [key]: (existing[key] || []).filter(a => a.id !== attachId) };
  updateFeatureState(featureId, { qAttachments: updated });
  renderQuestionsList(featureId);
}

function renderDocs() {
  getAllFeatures().filter(f => f.hasDoc).forEach(f => {
    const container = document.getElementById(`${f.id}_docs_view`);
    if (!container) return;

    // Iframe doc (full standalone HTML file)
    if (f.docSrc) {
      container.innerHTML = `
        <div class="doc-toolbar">
          <div class="doc-toolbar-left">Design spec · <a href="${f.docSrc}" target="_blank" class="link-chip" style="display:inline-flex">↗ Open full screen</a></div>
        </div>
        <iframe src="${f.docSrc}" style="width:100%;height:80vh;border:1px solid var(--border);border-radius:var(--radius);background:#fff;" title="${f.title} spec"></iframe>`;
      return;
    }

    // Markdown doc
    const rawEl = document.getElementById(`doc-${f.id}`);
    const savedDoc = getFeatureState(f.id).doc;
    const raw = savedDoc || (rawEl ? rawEl.textContent.trim() : null);

    if (raw) {
      container.innerHTML = `
        <div class="doc-toolbar">
          <div class="doc-toolbar-left">${f.docLabel || 'Docs'} · paste new content below to update</div>
          <button class="btn" onclick="toggleDocEdit('${f.id}')">Edit Doc</button>
        </div>
        <div id="${f.id}_doc_editor" style="display:none;margin-bottom:20px;">
          <textarea class="doc-paste-area" id="${f.id}_doc_input" style="display:block"
            placeholder="Paste raw markdown here...">${raw}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-primary" onclick="saveDoc('${f.id}')">Save</button>
            <button class="btn" onclick="toggleDocEdit('${f.id}')">Cancel</button>
          </div>
        </div>
        <div class="context-card">
          <div class="md-body" id="${f.id}_md_output">${marked.parse(raw)}</div>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="doc-empty">
          <h3>No domain doc yet</h3>
          <p>Paste any markdown content from Glean below to add it here.</p>
          <textarea class="doc-paste-area" id="${f.id}_doc_input" style="display:block;text-align:left"
            placeholder="Paste raw markdown here..."></textarea>
          <div style="margin-top:10px">
            <button class="btn btn-primary" onclick="saveDoc('${f.id}')">Add Doc</button>
          </div>
        </div>`;
    }
  });
}

function renderDomainDocs() {
  getAllFeatures().filter(f => f.hasDomainDoc).forEach(f => {
    const container = document.getElementById(`${f.id}_ddocs_view`);
    if (!container) return;
    const rawEl = document.getElementById(`ddoc-${f.id}`);
    const raw = getFeatureState(f.id).ddoc || (rawEl ? rawEl.textContent.trim() : null);

      container.innerHTML = `<div class="doc-empty"><h3>No domain doc yet</h3><p>Add a <code>ddoc-${f.id}</code> script element with markdown content.</p></div>`;

function toggleDocEdit(featureId) {
  const editor = document.getElementById(`${featureId}_doc_editor`);
  if (!editor) return;
  editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
}

function saveDoc(featureId) {
  const input = document.getElementById(`${featureId}_doc_input`);
  if (!input) return;
  const raw = input.value.trim();
  if (!raw) return;

  // Persist to localStorage
  updateFeatureState(featureId, { doc: raw });

  // Re-render the markdown output
  const output = document.getElementById(`${featureId}_md_output`);
  if (output) {
    output.innerHTML = marked.parse(raw);
    toggleDocEdit(featureId);
  } else {
    // First time save — re-render whole docs view
    const rawEl = document.getElementById(`doc-${featureId}`);
    if (rawEl) rawEl.textContent = raw;
    renderDocs();
  }
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getCalls(featureId) {
  return getFeatureState(featureId).calls || [];
}

function saveCalls(featureId, calls) {
  updateFeatureState(featureId, { calls });
}

function addCall(featureId) {
  const calls = getCalls(featureId);
  saveCalls(featureId, [...calls, {
    id: Date.now().toString(),
    label: '',
    date: '',
    link: '',
    transcript: '',
    summary: '',
  }]);
  renderCallsList(featureId);
}

function removeCall(featureId, callId) {
  saveCalls(featureId, getCalls(featureId).filter(c => c.id !== callId));
  renderCallsList(featureId);
}

function updateCallField(featureId, callId, field, value) {
  const calls = getCalls(featureId).map(c =>
    c.id === callId ? { ...c, [field]: value } : c
  );
  saveCalls(featureId, calls);
}

function renderCallsList(featureId) {
  const el = document.getElementById(`${featureId}_calls_list`);
  if (!el) return;
  const calls = getCalls(featureId);
  if (!calls.length) {
    el.innerHTML = `
      <div class="context-card" style="text-align:center;padding:48px 20px">
        <span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim);display:block;margin-bottom:10px">call</span>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">No customer calls yet.<br>Track recordings, paste transcripts, and generate AI summaries.</div>
        <button class="btn btn-primary" style="font-size:12px;padding:6px 16px" onclick="addCall('${featureId}')">+ Add Call</button>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Customer Context</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">Call recordings, transcripts, and AI summaries</div>
      </div>
      <button class="btn btn-primary" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;flex-shrink:0" onclick="addCall('${featureId}')">
        <span class="material-symbols-rounded" style="font-size:14px">add</span> Add Call
      </button>
    </div>
    ${calls.map(call => buildCallCard(featureId, call)).join('')}`;

// ── SUMMARY VIEW / EDIT ────────────────────────────────────────
const _summaryBlurLock = {};

function saveSummaryFromBlur(featureId, callId) {
  const ta = document.getElementById(`summary_ta_${callId}`);
  if (!ta || ta.style.display === 'none') return;
  const val = ta.value;
  updateCallField(featureId, callId, 'summary', val);
  if (!val.trim()) return;

  // Switch to rendered view
  const rendered = document.getElementById(`summary_rendered_${callId}`);
  if (rendered) { rendered.innerHTML = marked.parse(val); rendered.style.display = 'block'; }
  ta.style.display = 'none';

  const btns = document.getElementById(`summary_btns_${callId}`);
  if (btns) btns.style.display = 'flex';

  const editBtn = document.getElementById(`edit_summary_btn_${callId}`);
  if (editBtn) editBtn.innerHTML = '<span class="material-symbols-rounded" style="font-size:13px">edit</span> Edit';

  // Block the immediately-following button click from re-entering edit mode
  _summaryBlurLock[callId] = true;
  setTimeout(() => { _summaryBlurLock[callId] = false; }, 200);
}

function toggleSummaryEdit(featureId, callId) {
  if (_summaryBlurLock[callId]) { _summaryBlurLock[callId] = false; return; }
  const ta = document.getElementById(`summary_ta_${callId}`);
  const rendered = document.getElementById(`summary_rendered_${callId}`);
  const editBtn = document.getElementById(`edit_summary_btn_${callId}`);
  if (!ta) return;

  const isEditing = ta.style.display !== 'none';
  if (isEditing) {
    // Save and switch to rendered
    const val = ta.value;
    updateCallField(featureId, callId, 'summary', val);
    if (rendered) { rendered.innerHTML = marked.parse(val); rendered.style.display = 'block'; }
    ta.style.display = 'none';
    if (editBtn) editBtn.innerHTML = '<span class="material-symbols-rounded" style="font-size:13px">edit</span> Edit';
  } else {
    // Switch to edit mode
    if (rendered) rendered.style.display = 'none';
    ta.style.display = 'block';
    ta.focus();
    if (editBtn) editBtn.innerHTML = '<span class="material-symbols-rounded" style="font-size:13px">check</span> Done';
  }
}

function copySummary(featureId, callId) {
  const call = getCalls(featureId).find(c => c.id === callId);
  if (!call) return;
  navigator.clipboard.writeText(call.summary || '').then(() => showToast());
}

function expandSummary(featureId, callId) {
  const call = getCalls(featureId).find(c => c.id === callId);
  if (!call || !call.summary) return;
  const modal = document.getElementById('summary-modal');
  const content = document.getElementById('summary-modal-content');
  const title = document.getElementById('summary-modal-title');
  modal.dataset.summary = call.summary;
  if (title) title.textContent = call.label ? `${call.label}${call.date ? '  ·  ' + call.date : ''}` : 'Call Summary';
  if (content) content.innerHTML = marked.parse(call.summary);
  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeSummaryModal() {
  document.getElementById('summary-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function copySummaryFromModal() {
  const modal = document.getElementById('summary-modal');
  navigator.clipboard.writeText(modal.dataset.summary || '').then(() => showToast());
}

// ── AI SUMMARY VIA CLIPBOARD ───────────────────────────────────
function copyPromptForAI(featureId, callId) {
  const call = getCalls(featureId).find(c => c.id === callId);
  if (!call) return;

  if (!call.transcript.trim()) {
    alert('Paste a transcript first, then click the button.');
    return;
  }

  const f = getAllFeatures().find(x => x.id === featureId);

  const prompt = `You are a product design assistant at BuildOps summarizing a customer discovery call for a Staff Product Designer.

Feature being discussed: "${f ? f.title : featureId}"
${f && f.summary ? `Feature context: ${f.summary}` : ''}

Analyze the transcript below and return a structured summary with these sections:

**Key Pain Points** — specific problems the customer described (include direct quotes where impactful)
**Key Insights** — findings that inform design or product decisions
**Validated / Challenged Assumptions** — what confirmed or changed existing thinking
**Open Questions** — unresolved items that need follow-up
**Action Items** — concrete next steps mentioned

Be concise and direct. Use bullet points. Preserve impactful quotes verbatim.

---
TRANSCRIPT:
${call.transcript}`;

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.getElementById(`gen_${callId}`);
    if (btn) {
      btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:13px">check_circle</span> Copied! Paste into Claude.ai';
      btn.style.background = 'var(--green-bg)';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(() => {
        btn.innerHTML = '<span class="material-symbols-rounded" style="font-size:13px">auto_awesome</span> Copy prompt → Claude.ai';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 3000);
    }
    window.open('https://claude.ai', '_blank');
  }).catch(() => {
    alert('Could not copy to clipboard. Try selecting and copying the transcript manually.');
  });
}

function getDomainKnowledge(featureId) {
  return getFeatureState(featureId).domainKnowledge || [];
}

function addDomainKnowledge(featureId) {
  const entries = getDomainKnowledge(featureId);
  const id = Date.now().toString();
  updateFeatureState(featureId, { domainKnowledge: [...entries, { id, title: '', content: '' }] });
  renderDomainKnowledgeList(featureId);
  // Auto-expand the new entry
  setTimeout(() => {
    const body = document.getElementById(`dk_body_${featureId}_${id}`);
    const chevron = document.getElementById(`dk_chevron_${featureId}_${id}`);
    if (body) body.classList.add('open');
    if (chevron) chevron.classList.add('open');
    const titleInput = document.querySelector(`#dk_body_${featureId}_${id}`)?.closest('.dk-entry')?.querySelector('.dk-entry-title-input');
    if (titleInput) titleInput.focus();
  }, 50);
}

function removeDomainKnowledge(featureId, id) {
  const entries = getDomainKnowledge(featureId).filter(e => e.id !== id);
  updateFeatureState(featureId, { domainKnowledge: entries });
  renderDomainKnowledgeList(featureId);
}

function updateDKField(featureId, id, field, value) {
  const entries = getDomainKnowledge(featureId).map(e =>
    e.id === id ? { ...e, [field]: value } : e
  );
  updateFeatureState(featureId, { domainKnowledge: entries });
}

function toggleDKEntry(featureId, id) {
  const body = document.getElementById(`dk_body_${featureId}_${id}`);
  const chevron = document.getElementById(`dk_chevron_${featureId}_${id}`);
  if (!body) return;
  body.classList.toggle('open');
  if (chevron) chevron.classList.toggle('open');
}

function toggleDKEdit(featureId, id) {
  const ta = document.getElementById(`dk_ta_${featureId}_${id}`);
  const rendered = document.getElementById(`dk_rendered_${featureId}_${id}`);
  const editBtn = document.getElementById(`dk_editbtn_${featureId}_${id}`);
  if (!ta) return;
  const isEditing = ta.style.display !== 'none';
  if (isEditing) {
    const val = ta.value;
    updateDKField(featureId, id, 'content', val);
    if (rendered) {
      rendered.innerHTML = val ? marked.parse(val) : '<span style="color:var(--text-dim);font-size:13px">No content yet.</span>';
      rendered.style.display = 'block';
    }
    ta.style.display = 'none';
    if (editBtn) editBtn.textContent = 'Edit';
  } else {
    if (rendered) rendered.style.display = 'none';
    ta.style.display = 'block';
    ta.focus();
    if (editBtn) editBtn.textContent = 'Done';
  }
}

function buildDKEntryCard(featureId, e) {
  const hasContent = !!(e.content && e.content.trim());
  return `
  <div class="dk-entry">
    <div class="dk-entry-header" onclick="toggleDKEntry('${featureId}','${e.id}')">
      <span class="dk-chevron" id="dk_chevron_${featureId}_${e.id}">▶</span>
      <input class="dk-entry-title-input"
        value="${escHtml(e.title)}"
        placeholder="Entry title…"
        onclick="event.stopPropagation()"
        onblur="updateDKField('${featureId}','${e.id}','title',this.value)" />
      <button class="remove-btn" title="Delete entry"
        onclick="event.stopPropagation();removeDomainKnowledge('${featureId}','${e.id}')"><span class="material-symbols-rounded">delete</span></button>
    </div>
    <div class="dk-entry-body" id="dk_body_${featureId}_${e.id}">
      <div id="dk_rendered_${featureId}_${e.id}" class="md-body dk-entry-rendered" style="display:${hasContent ? 'block' : 'none'}">
        ${hasContent ? marked.parse(e.content) : ''}
      </div>
      <textarea class="dk-entry-content" id="dk_ta_${featureId}_${e.id}"
        placeholder="Add notes, domain context, or paste markdown…"
        style="display:${hasContent ? 'none' : 'block'}"
        onblur="updateDKField('${featureId}','${e.id}','content',this.value)">${escHtml(e.content)}</textarea>
      <div class="dk-entry-actions">
        <button class="btn" id="dk_editbtn_${featureId}_${e.id}"
          onclick="toggleDKEdit('${featureId}','${e.id}')">${hasContent ? 'Edit' : 'Done'}</button>
      </div>
    </div>
  </div>`;
}

function renderDomainKnowledgeList(featureId) {
  const panel = document.getElementById(`${featureId}_dk_panel`);

  const entries = getDomainKnowledge(featureId);
  if (!entries.length) {

      <div>

// Context field state helpers — store overrides in fh_state so ALL features are editable
function getCtxSummary(id, fallback) {
  const s = loadState()[id] || {};
  return s.ctx_summary !== undefined ? s.ctx_summary : (fallback || '');
}
function getCtxArr(id, key, fallback) {
  const s = loadState()[id] || {};
  const v = s['ctx_' + key];
  return v !== undefined ? v : (fallback || []);
}
function setCtxField(id, key, value) {
  updateFeatureState(id, { ['ctx_' + key]: value });
  showToast();
}

function buildContextTabHtml(f) {
  const id = f.id;
  const summary     = getCtxSummary(id, f.summary);
  const decisions   = getCtxArr(id, 'decisions',   f.decisions   || []);
  const constraints = getCtxArr(id, 'constraints', f.constraints || []);
  const team        = getCtxArr(id, 'team',        f.team        || []);
  const links       = getCtxArr(id, 'links',       f.links       || []);

  // Summary
  const summaryHtml = `<textarea class="editable-note" style="min-height:72px;margin-top:4px"
      placeholder="Describe this feature…"
      onblur="setCtxField('${id}','summary',this.value)">${escHtml(summary)}</textarea>`;

  // Decisions
  const decItemsHtml = decisions.length
    ? `<ul class="decision-list">${decisions.map((d, i) => `
        <li style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <span style="flex:1">${escHtml(d)}</span>
          <button class="remove-btn" title="Remove" onclick="removeCtxArrItem('${id}','decisions',${i})"><span class="material-symbols-rounded">delete</span></button>
        </li>`).join('')}</ul>`
    : `<p style="color:var(--text-dim);font-size:13px;margin-bottom:10px">No decisions recorded yet</p>`;
  const decisionsHtml = decItemsHtml + `
    <div class="add-item-row" style="padding-top:8px">
      <input class="add-item-input" id="${id}_add_decision" placeholder="Add a key decision…"
        onkeydown="if(event.key==='Enter')addCtxArrItem('${id}','decisions','${id}_add_decision')" />
      <button class="btn btn-primary" onclick="addCtxArrItem('${id}','decisions','${id}_add_decision')">Add</button>
    </div>`;

  // Constraints
  const conItemsHtml = constraints.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">${constraints.map((c, i) =>
        `<span class="constraint-tag" style="display:inline-flex;align-items:center;gap:4px">${escHtml(c)}<button style="background:none;border:none;cursor:pointer;color:var(--text-dim);padding:0;display:flex;align-items:center" onclick="removeCtxArrItem('${id}','constraints',${i})" title="Remove"><span class="material-symbols-rounded" style="font-size:13px">close</span></button></span>`
      ).join('')}</div>`
    : `<p style="color:var(--text-dim);font-size:13px;margin-bottom:10px">None noted</p>`;
  const constraintsHtml = conItemsHtml + `
    <div class="add-item-row" style="padding-top:0;border-top:none">
      <input class="add-item-input" id="${id}_add_constraint" placeholder="Add a constraint or non-goal…"
        onkeydown="if(event.key==='Enter')addCtxArrItem('${id}','constraints','${id}_add_constraint')" />
      <button class="btn btn-primary" onclick="addCtxArrItem('${id}','constraints','${id}_add_constraint')">Add</button>
    </div>`;

  // Team
  const teamItemsHtml = team.length
    ? `<div class="team-row" style="margin-bottom:10px">${team.map((p, i) => `
        <div class="team-person">
          <div class="avatar">${initials(p.name)}</div>
          ${escHtml(p.name)} <span style="color:var(--text-dim)">· ${escHtml(p.role)}</span>
          <button class="remove-btn" title="Remove" onclick="removeCtxTeamMember('${id}',${i})"><span class="material-symbols-rounded">close</span></button>
        </div>`).join('')}</div>`
    : `<p style="color:var(--text-dim);font-size:13px;margin-bottom:10px">No team members yet</p>`;
  const teamHtml = teamItemsHtml + `
    <div class="add-item-row" style="padding-top:0;border-top:none">
      <input class="add-item-input" id="${id}_add_team_name" placeholder="Name…" style="flex:1.5"
        onkeydown="if(event.key==='Enter')addCtxTeamMember('${id}')" />
      <input class="add-item-input" id="${id}_add_team_role" placeholder="Role…"
        onkeydown="if(event.key==='Enter')addCtxTeamMember('${id}')" />
      <button class="btn btn-primary" onclick="addCtxTeamMember('${id}')">Add</button>
    </div>`;

  // Links
  const linkItemsHtml = links.length
    ? `<div class="links-grid" style="margin-bottom:10px">${links.map((l, i) => `
        <div style="display:flex;align-items:center;gap:5px">
          <a class="link-chip" href="${escHtml(l.url)}" target="_blank">
            <span class="material-symbols-rounded" style="font-size:12px">open_in_new</span>${escHtml(l.label)}
          </a>
          <button class="remove-btn" title="Remove" onclick="removeCtxLink('${id}',${i})"><span class="material-symbols-rounded">close</span></button>
        </div>`).join('')}</div>`
    : `<p style="color:var(--text-dim);font-size:13px;margin-bottom:10px">No links added yet</p>`;
  const linksHtml = linkItemsHtml + `
    <div style="display:flex;gap:6px;align-items:center;margin-top:2px">
      <input class="add-item-input" id="${id}_add_link_label" placeholder="Label…" style="flex:1"
        onkeydown="if(event.key==='Enter')addCtxLink('${id}')" />
      <input class="add-item-input" id="${id}_add_link_url" placeholder="https://…" style="flex:2"
        onkeydown="if(event.key==='Enter')addCtxLink('${id}')" />
      <button class="btn btn-primary" onclick="addCtxLink('${id}')">Add</button>
    </div>`;

  return `
    <div class="context-card">
      <h3><span class="material-symbols-rounded ctx-icon">menu_book</span> Summary</h3>
      ${summaryHtml}
    </div>
    <div class="context-card">
      <h3><span class="material-symbols-rounded ctx-icon">task_alt</span> Key Decisions</h3>
      ${decisionsHtml}
    </div>
    <div class="context-card">
      <h3><span class="material-symbols-rounded ctx-icon">block</span> Constraints &amp; Non-goals</h3>
      ${constraintsHtml}
    </div>
    <div class="context-card">
      <h3><span class="material-symbols-rounded ctx-icon">group</span> Team</h3>
      ${teamHtml}
    </div>
    <div class="context-card">
      <h3><span class="material-symbols-rounded ctx-icon">link</span> Links</h3>
      ${linksHtml}
    </div>`;
}

function renderContextTab(featureId) {
  const f = getAllFeatures().find(x => x.id === featureId);
  const panel = document.getElementById(`${featureId}_tab_context`);
  if (!f || !panel) return;
  panel.innerHTML = buildContextTabHtml(f);
}

// Keep patchCustomFeature for Edit Info modal (title/icon/status/customer/due)
function patchCustomFeature(featureId, field, value) {
  const custom = loadCustomFeatures().map(f =>
    f.id === featureId ? { ...f, [field]: value } : f
  );
  saveCustomFeatures(custom);
}

function addCtxArrItem(featureId, field, inputId) {
  const inp = document.getElementById(inputId);
  const text = inp && inp.value.trim();
  if (!text) return;
  const f = getAllFeatures().find(x => x.id === featureId);
  if (!f) return;
  setCtxField(featureId, field, [...getCtxArr(featureId, field, f[field] || []), text]);
  if (inp) inp.value = '';
  renderContextTab(featureId);
}

function removeCtxArrItem(featureId, field, index) {
  const f = getAllFeatures().find(x => x.id === featureId);
  if (!f) return;
  setCtxField(featureId, field, getCtxArr(featureId, field, f[field] || []).filter((_, i) => i !== index));
  renderContextTab(featureId);
}

function addCtxTeamMember(featureId) {
  const f = getAllFeatures().find(x => x.id === featureId);
  if (!f) return;
  const nameEl = document.getElementById(`${featureId}_add_team_name`);
  const roleEl = document.getElementById(`${featureId}_add_team_role`);
  const name = nameEl && nameEl.value.trim();
  if (!name) { if (nameEl) nameEl.focus(); return; }
  setCtxField(featureId, 'team', [...getCtxArr(featureId, 'team', f.team || []), { name, role: roleEl ? roleEl.value.trim() : '' }]);
  if (nameEl) nameEl.value = '';
  if (roleEl) roleEl.value = '';
  renderContextTab(featureId);
}

function removeCtxTeamMember(featureId, index) {
  const f = getAllFeatures().find(x => x.id === featureId);
  if (!f) return;
  setCtxField(featureId, 'team', getCtxArr(featureId, 'team', f.team || []).filter((_, i) => i !== index));
  renderContextTab(featureId);
}

function addCtxLink(featureId) {
  const f = getAllFeatures().find(x => x.id === featureId);
  if (!f) return;
  const labelEl = document.getElementById(`${featureId}_add_link_label`);
  const urlEl = document.getElementById(`${featureId}_add_link_url`);
  const url = urlEl && urlEl.value.trim();
  if (!url) { if (urlEl) urlEl.focus(); return; }
  setCtxField(featureId, 'links', [...getCtxArr(featureId, 'links', f.links || []), { label: (labelEl && labelEl.value.trim()) || url, url }]);
  if (labelEl) labelEl.value = '';
  if (urlEl) urlEl.value = '';
  renderContextTab(featureId);
}

function removeCtxLink(featureId, index) {
  const f = getAllFeatures().find(x => x.id === featureId);
  if (!f) return;
  setCtxField(featureId, 'links', getCtxArr(featureId, 'links', f.links || []).filter((_, i) => i !== index));
  renderContextTab(featureId);
}

// ═══════════════════════════════════════════════════════════════
//  DELETED FEATURES (soft-delete + restore)
// ═══════════════════════════════════════════════════════════════
function loadDeletedFeatures() {
  try { return JSON.parse(localStorage.getItem('fh_deleted_features') || '[]'); }
  catch { return []; }
}

function saveDeletedFeatures(features) {
  localStorage.setItem('fh_deleted_features', JSON.stringify(features));
}

function restoreDeletedFeature(featureId) {
  const deleted = loadDeletedFeatures();
  const feature = deleted.find(f => f.id === featureId);
  if (!feature) return;

  const { deletedAt, ...clean } = feature;
  saveCustomFeatures([...loadCustomFeatures(), clean]);
  saveDeletedFeatures(deleted.filter(f => f.id !== featureId));

  // Add feature view to DOM
  const featureViews = document.getElementById('feature-views');
  featureViews.insertAdjacentHTML('beforeend', buildFeatureView(clean));
  renderTodoList(clean.id);
  renderDoneList(clean.id);
  renderQuestionsList(clean.id);
  renderCallsList(clean.id);
  renderDomainKnowledgeList(clean.id);
  renderNotesTab(clean.id);
  renderDesignTab(clean.id);
  renderDesignSpecTab(clean.id);

  renderSidebar();
  renderScheduleCards();
  renderDeletedFeaturesSection();
  setTimeout(() => showFeature(clean.id), 50);
}

function renderDeletedFeaturesSection() {
  const section = document.getElementById('deleted-features-section');
  if (!section) return;
  const deleted = loadDeletedFeatures();
  if (!deleted.length) { section.innerHTML = ''; return; }
  section.innerHTML = `
    <div style="margin-top:24px">
      <button class="deleted-q-toggle" id="deleted-feat-btn" onclick="toggleDeletedFeaturesSection()" style="width:100%">
        <span class="material-symbols-rounded">expand_more</span>
        ${deleted.length} deleted feature${deleted.length !== 1 ? 's' : ''} — click to restore
      </button>
      <div id="deleted-feat-list" style="display:none;margin-top:8px">
        ${deleted.map(f => `
          <div class="deleted-q-item" style="opacity:1">
            <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
              <span class="material-symbols-rounded" style="font-size:18px;color:var(--text-dim);flex-shrink:0">${f.icon}</span>
              <span class="deleted-q-text" style="text-decoration:none;color:var(--text-muted)">${escHtml(f.title)}</span>
              <span class="badge ${STATUS_BADGE[f.status] || 'badge-done'}" style="opacity:.6;flex-shrink:0">${f.status}</span>
            </div>
            <button class="restore-btn" onclick="restoreDeletedFeature('${f.id}')">
              <span class="material-symbols-rounded">undo</span> Restore
            </button>
          </div>`).join('')}
      </div>
    </div>`;
}

function toggleDeletedFeaturesSection() {
  const list = document.getElementById('deleted-feat-list');
  const btn = document.getElementById('deleted-feat-btn');
  if (!list) return;
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'block';
  const icon = btn && btn.querySelector('.material-symbols-rounded');
  if (icon) icon.textContent = open ? 'expand_more' : 'expand_less';
}

  document.getElementById('af-due').value = f.due === 'TBD' ? '' : (f.due || '');
  document.getElementById('af-summary').value = f.summary || '';
  document.getElementById('af-status').value = f.status || 'Discovery';
  _afSelectedIcon = f.icon || 'star';
  renderAFIconPicker();
  setTimeout(() => document.getElementById('af-title').focus(), 50);
}

function closeAddFeatureModal() {
  document.getElementById('add-feature-modal').style.display = 'none';
  document.body.style.overflow = '';
  _afEditingId = null;
}

function renderAFIconPicker() {
  const grid = document.getElementById('af-icon-grid');
  if (!grid) return;
  grid.innerHTML = AF_ICONS.map(icon => `
    <button class="icon-picker-btn${icon === _afSelectedIcon ? ' selected' : ''}"
      title="${icon}" onclick="selectAFIcon('${icon}')">
      <span class="material-symbols-rounded">${icon}</span>
    </button>`).join('');
}

function selectAFIcon(icon) {
  _afSelectedIcon = icon;
  renderAFIconPicker();
}

function submitNewFeature() {
  const titleEl = document.getElementById('af-title');
  const title = titleEl.value.trim();
  if (!title) {
    titleEl.classList.add('error');
    titleEl.focus();
    setTimeout(() => titleEl.classList.remove('error'), 1500);
    return;
  }

  const newTitle    = title;
  const newIcon     = _afSelectedIcon;
  const newStatus   = document.getElementById('af-status').value;
  const newCustomer = document.getElementById('af-customer').value.trim() || 'TBD';
  const newDue      = document.getElementById('af-due').value.trim() || 'TBD';
  const newSummary  = document.getElementById('af-summary').value.trim();

  if (_afEditingId) {
    // ── EDIT MODE: update existing custom feature ──────────────
    const custom = loadCustomFeatures().map(f => {
      if (f.id !== _afEditingId) return f;
      return { ...f, title: newTitle, icon: newIcon, status: newStatus,
               customer: newCustomer, due: newDue, summary: newSummary };
    });
    saveCustomFeatures(custom);

    // Update the feature header in the DOM (icon, title, status select, meta row)
    const titleH2 = document.querySelector(`#view-${_afEditingId} .feature-title-block h2`);
    if (titleH2) titleH2.innerHTML =
      `<span class="material-symbols-rounded" style="font-size:20px;vertical-align:middle;margin-right:8px;opacity:.8">${newIcon}</span>${escHtml(newTitle)}`;
    const statusSel = document.getElementById(`${_afEditingId}_status_sel`);
    if (statusSel) {
      statusSel.value = newStatus;
      statusSel.className = 'status-select ' + (STATUS_BADGE[newStatus] || 'badge-done');
    }
    const metaCustomer = document.querySelector(`#view-${_afEditingId} .meta-customer`);
    if (metaCustomer) metaCustomer.textContent = newCustomer;
    const dueInput = document.querySelector(`#view-${_afEditingId} .due-input`);
    if (dueInput) dueInput.value = newDue;
    // Re-render context tab so summary reflects the change
    renderContextTab(_afEditingId);

    renderSidebar();
    renderScheduleCards();
    closeAddFeatureModal();
    showToast();
    return;
  }

  // ── CREATE MODE ────────────────────────────────────────────────
  const id = 'custom_' + Date.now();
  const feature = {
    id,
    icon: newIcon,
    title: newTitle,
    status: newStatus,
    hasDoc: false,
    hasDomainDoc: false,
    customer: newCustomer,
    due: newDue,
    team: [],
    currentFocus: '',
    summary: newSummary,
    decisions: [],
    constraints: [],
    links: [],
    done: [],
    todo: [],
    questions: [],
    isCustom: true,
  };

  const custom = loadCustomFeatures();
  saveCustomFeatures([...custom, feature]);

  // Append feature view to DOM
  const featureViews = document.getElementById('feature-views');
  featureViews.insertAdjacentHTML('beforeend', buildFeatureView(feature));

  renderTodoList(feature.id);
  renderDoneList(feature.id);
  renderQuestionsList(feature.id);
  renderCallsList(feature.id);
  renderDomainKnowledgeList(feature.id);
  renderNotesTab(feature.id);
  renderDesignTab(feature.id);
  renderDesignSpecTab(feature.id);

  renderSidebar();
  renderScheduleCards();

  closeAddFeatureModal();
  setTimeout(() => showFeature(feature.id), 50);
}

function deleteCustomFeature(featureId) {
  if (!confirm('Delete this feature? You can restore it later from the Schedule Overview.')) return;

  const custom = loadCustomFeatures();
  const feature = custom.find(f => f.id === featureId);
  if (!feature) return;

  // Move to deleted list (soft delete)
  saveCustomFeatures(custom.filter(f => f.id !== featureId));
  saveDeletedFeatures([...loadDeletedFeatures(), { ...feature, deletedAt: Date.now() }]);

  // Remove feature view from DOM
  const view = document.getElementById('view-' + featureId);
  if (view) view.remove();

  // Navigate back to schedule
  const scheduleNav = document.querySelector('[data-view="schedule"]');
  showView('schedule', scheduleNav);

  renderSidebar();
  renderScheduleCards();
  renderDeletedFeaturesSection();
}

const _noteEditMode = {};

function getNoteEntries(id) {
  const s = loadState()[id] || {};
  if (s.notesEntries !== undefined) return s.notesEntries;
  // Migrate from old single-note textarea
  const old = s.notes || '';
  const init = old.trim() ? [{ id: 'n_mig', text: old.trim(), createdAt: Date.now() }] : [];
  updateFeatureState(id, { notesEntries: init });
  return init;
}

function saveNoteEntries(id, v) { updateFeatureState(id, { notesEntries: v }); }

function renderNotesTab(id) {
  const panel = document.getElementById(id + '_notes_panel');
  if (!panel) return;
  const entries = getNoteEntries(id).slice().reverse();
  const itemsHtml = entries.map(n => {
    const ek = id + '::' + n.id;
    if (_noteEditMode[ek]) {
      return `<div class="note-entry note-editing">
        <textarea class="editable-note" id="ne_${id}_${n.id}" style="min-height:80px;margin-top:0">${escHtml(n.text)}</textarea>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn btn-primary" style="font-size:12px;padding:4px 14px" onclick="saveNoteEntry('${id}','${n.id}')">Save</button>
          <button class="btn" style="font-size:12px;padding:4px 14px" onclick="cancelNoteEdit('${id}','${n.id}')">Cancel</button>
        </div>
      </div>`;
    }
    return `<div class="note-entry">
      <div class="note-entry-body">${marked.parse(n.text || '')}</div>
      <div class="note-entry-meta">
        <span class="note-ts">${formatNoteDate(n.createdAt)}</span>
        <div style="display:flex;gap:3px">
          <button class="q-icon-btn" title="Edit" onclick="editNoteEntry('${id}','${n.id}')">
            <span class="material-symbols-rounded">edit</span>
          </button>
          <button class="q-icon-btn del" title="Delete" onclick="deleteNoteEntry('${id}','${n.id}')">
            <span class="material-symbols-rounded">delete</span>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  if (!entries.length) {
    panel.innerHTML = `
      <div class="context-card" style="text-align:center;padding:48px 20px">
        <span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim);display:block;margin-bottom:10px">sticky_note_2</span>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">No notes yet.<br>Capture meeting takeaways, decisions, or reminders.</div>
        <button class="btn btn-primary" style="font-size:12px;padding:6px 16px" onclick="addNoteEntry('${id}')">+ Add Note</button>
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Notes</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">Meeting takeaways, decisions, and reminders</div>
      </div>
      <button class="btn btn-primary" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;flex-shrink:0" onclick="addNoteEntry('${id}')">
        <span class="material-symbols-rounded" style="font-size:14px">add</span> Add Note
      </button>
    </div>
    <div class="context-card">
      <div>${itemsHtml}</div>
    </div>`;
}

function formatNoteDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function addNoteEntry(id) {
  const note = { id: 'n' + Date.now(), text: '', createdAt: Date.now() };
  saveNoteEntries(id, [...getNoteEntries(id), note]);
  _noteEditMode[id + '::' + note.id] = true;
  renderNotesTab(id);
  setTimeout(() => { const ta = document.getElementById('ne_' + id + '_' + note.id); if (ta) ta.focus(); }, 30);
}

function editNoteEntry(id, noteId) {
  _noteEditMode[id + '::' + noteId] = true;
  renderNotesTab(id);
  setTimeout(() => {
    const ta = document.getElementById('ne_' + id + '_' + noteId);
    if (ta) { ta.focus(); ta.selectionStart = ta.selectionEnd = ta.value.length; }
  }, 30);
}

function saveNoteEntry(id, noteId) {
  const ta = document.getElementById('ne_' + id + '_' + noteId);
  const text = ta ? ta.value.trim() : '';
  if (!text) { cancelNoteEdit(id, noteId); return; }
  saveNoteEntries(id, getNoteEntries(id).map(n => n.id === noteId ? { ...n, text } : n));
  delete _noteEditMode[id + '::' + noteId];
  renderNotesTab(id);
  showToast();
}

function cancelNoteEdit(id, noteId) {
  const entries = getNoteEntries(id);
  const note = entries.find(n => n.id === noteId);
  if (note && !note.text) saveNoteEntries(id, entries.filter(n => n.id !== noteId));
  delete _noteEditMode[id + '::' + noteId];
  renderNotesTab(id);
}

function deleteNoteEntry(id, noteId) {
  if (!confirm('Delete this note?')) return;
  saveNoteEntries(id, getNoteEntries(id).filter(n => n.id !== noteId));
  delete _noteEditMode[id + '::' + noteId];
  renderNotesTab(id);
}

function isValidUrl(str) {
  try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; }
  catch { return false; }
}

const _designFileEditMode = {};

function getDesignFiles(id) {

// ── CRUD ─────────────────────────────────────────────────────
function addDesignFile(id) {
  const df = { id: 'df' + Date.now(), title: '', figmaUrl: '', figmaLabel: '', protoUrl: '', protoLabel: '', screenshots: [], notes: '', createdAt: Date.now() };
  saveDesignFiles(id, [...getDesignFiles(id), df]);
  _designFileEditMode[id + '::' + df.id] = true;
  renderDesignTab(id);
  setTimeout(() => { const el = document.getElementById('df_title_' + id + '_' + df.id); if (el) el.focus(); }, 30);
}

function editDesignFile(id, dfId) {
  _designFileEditMode[id + '::' + dfId] = true;
  renderDesignTab(id);
  setTimeout(() => { const el = document.getElementById('df_title_' + id + '_' + dfId); if (el) el.focus(); }, 30);
}

function saveDesignFile(id, dfId) {
  const title = (document.getElementById('df_title_' + id + '_' + dfId) || {}).value?.trim() || '';
  if (!title) {
    const el = document.getElementById('df_title_' + id + '_' + dfId);
    if (el) { el.style.borderColor = 'var(--red)'; setTimeout(() => el.style.borderColor = '', 1800); el.focus(); }
    return;
  }
  const figmaUrl   = (document.getElementById('df_figma_'    + id + '_' + dfId) || {}).value?.trim() || '';
  const figmaLabel = (document.getElementById('df_figmalbl_' + id + '_' + dfId) || {}).value?.trim() || '';
  const protoUrl   = (document.getElementById('df_proto_'    + id + '_' + dfId) || {}).value?.trim() || '';
  const protoLabel = (document.getElementById('df_protolbl_' + id + '_' + dfId) || {}).value?.trim() || '';
  const notes      = (document.getElementById('df_notes_'    + id + '_' + dfId) || {}).value?.trim() || '';
  const files = getDesignFiles(id);
  const idx = files.findIndex(x => x.id === dfId);
  if (idx === -1) return;
  files[idx] = { ...files[idx], title, figmaUrl, figmaLabel, protoUrl, protoLabel, notes };
  saveDesignFiles(id, files);
  delete _designFileEditMode[id + '::' + dfId];
  renderDesignTab(id);
  showToast();
}

function cancelDesignFile(id, dfId) {
  const files = getDesignFiles(id);
  const df = files.find(x => x.id === dfId);
  if (df && !df.title) saveDesignFiles(id, files.filter(x => x.id !== dfId));
  delete _designFileEditMode[id + '::' + dfId];
  renderDesignTab(id);
}

function deleteDesignFile(id, dfId) {
  if (!confirm('Delete this design file?')) return;
  saveDesignFiles(id, getDesignFiles(id).filter(x => x.id !== dfId));
  delete _designFileEditMode[id + '::' + dfId];
  renderDesignTab(id);
  showToast();
}

// ── Screenshots within a design file ─────────────────────────
function handleDesignFileScreenshot(id, dfId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const files = getDesignFiles(id);
    const idx = files.findIndex(x => x.id === dfId);
    if (idx === -1) return;
    files[idx].screenshots = [...(files[idx].screenshots || []), { id: 'sc' + Date.now(), url: e.target.result, label: file.name }];
    saveDesignFiles(id, files);
    renderDesignTab(id);
    showToast();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function handleDesignFilePaste(event, id, dfId) {
  const items = event.clipboardData && event.clipboardData.items;
  if (!items) { event.preventDefault(); return; }
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      event.preventDefault();
      const reader = new FileReader();
      reader.onload = e => {
        const files = getDesignFiles(id);
        const idx = files.findIndex(x => x.id === dfId);
        if (idx === -1) return;
        files[idx].screenshots = [...(files[idx].screenshots || []), { id: 'sc' + Date.now(), url: e.target.result, label: 'Pasted image' }];
        saveDesignFiles(id, files);
        renderDesignTab(id);
        showToast();
      };
      reader.readAsDataURL(item.getAsFile());
      return;
    }
  }
  event.preventDefault();
}

function deleteDesignFileScreenshot(id, dfId, scId) {
  if (!confirm('Remove this screenshot?')) return;
  const files = getDesignFiles(id);
  const idx = files.findIndex(x => x.id === dfId);
  if (idx === -1) return;
  files[idx].screenshots = files[idx].screenshots.filter(s => s.id !== scId);
  saveDesignFiles(id, files);
  renderDesignTab(id);
}
