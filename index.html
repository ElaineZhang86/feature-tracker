        <div style="font-size:14px;font-weight:600;color:var(--text)">Design Files</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px">Each file groups a Figma link, prototype, screenshots, and notes</div>
      </div>
      <button class="btn btn-primary" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;flex-shrink:0" onclick="addDesignFile('${id}')">
        <span class="material-symbols-rounded" style="font-size:14px">add</span> Add Design File
      </button>
    </div>
    ${filesHtml}`;
}

// ═══════════════════════════════════════════════════════════════
//  DESIGN SPEC TAB
// ═══════════════════════════════════════════════════════════════

const _specEditMode = {};

function getSpecLinks(id) {
  const s = loadState()[id] || {};
  if (s.specLinks !== undefined) return s.specLinks;
  updateFeatureState(id, { specLinks: [] });
  return [];
}
function saveSpecLinks(id, v) { updateFeatureState(id, { specLinks: v }); }

function toFigmaEmbedUrl(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('figma.com')) {
      return 'https://www.figma.com/embed?embed_host=share&url=' + encodeURIComponent(url);
    }
  } catch {}
  return null;
}

function toGithubRawUrl(url) {
  try {
    const u = new URL(url);
    if (u.hostname === 'github.com') {
      // /owner/repo/blob/branch/path/to/file
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts.length >= 5 && parts[2] === 'blob') {
        const [owner, repo, , branch, ...rest] = parts;
        return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${rest.join('/')}`;
      }
    }
  } catch {}
  return null;
}

function _specContentId(featureId, linkId) {
  return 'spc_' + featureId + '_' + linkId;
}

function renderSpecContent(featureId, linkId, url) {
  const el = document.getElementById(_specContentId(featureId, linkId));
  if (!el) return;

  const rawUrl = toGithubRawUrl(url);
  if (rawUrl) {
    const ext = rawUrl.split('?')[0].split('.').pop().toLowerCase();
    el.innerHTML = `<div class="spec-loading"><span class="material-symbols-rounded">progress_activity</span>Loading from GitHub…</div>`;
    fetch(rawUrl)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => {
        if (ext === 'md' || ext === 'markdown') {
          el.innerHTML = `<div class="context-card" style="margin-top:10px"><div class="md-body">${marked.parse(text)}</div></div>`;
        } else {
          // Non-markdown GitHub file — create a blob URL so it renders without CORS restrictions
          const blob = new Blob([text], { type: ext === 'html' ? 'text/html' : 'text/plain' });
          const blobUrl = URL.createObjectURL(blob);
          el.innerHTML = `<div class="spec-embed-wrap" style="margin-top:10px"><iframe src="${blobUrl}"></iframe></div>`;
        }
      })
      .catch(() => {
        el.innerHTML = `<div style="padding:12px;font-size:13px;color:var(--text-dim)">
          Could not load file from GitHub.
          <a href="${escHtml(url)}" target="_blank" class="link-chip" style="margin-left:6px">
            <span class="material-symbols-rounded" style="font-size:12px">open_in_new</span> Open on GitHub
          </a>
        </div>`;
      });
    return;
  }

  // Figma or general URL → iframe
  const embedUrl = toFigmaEmbedUrl(url) || url;
  el.innerHTML = `<div class="spec-embed-wrap" style="margin-top:10px">
    <iframe src="${escHtml(embedUrl)}" allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"
      onload="this.nextElementSibling.style.display='none'"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
    ></iframe>
    <div style="display:none;padding:24px;text-align:center;color:var(--text-dim);font-size:13px;flex-direction:column;align-items:center;gap:8px">
      <span class="material-symbols-rounded" style="font-size:32px">link_off</span>
      This content cannot be embedded. Use the link above to open it.
    </div>
  </div>`;
}

function addSpecLink(id) {
  const lk = { id: 'sl' + Date.now(), url: '', label: '' };
  saveSpecLinks(id, [...getSpecLinks(id), lk]);
  _specEditMode[id + '::' + lk.id] = true;
  renderDesignSpecTab(id);
  setTimeout(() => { const el = document.getElementById('sl_lbl_' + id + '_' + lk.id); if (el) el.focus(); }, 30);
}

function editSpecLink(id, linkId) {
  _specEditMode[id + '::' + linkId] = true;
  renderDesignSpecTab(id);
}

function saveSpecLink(id, linkId) {
  const url = (document.getElementById('sl_url_' + id + '_' + linkId) || {}).value || '';
  const label = (document.getElementById('sl_lbl_' + id + '_' + linkId) || {}).value || '';
  if (!isValidUrl(url.trim())) {
    const errEl = document.getElementById('sl_err_' + id + '_' + linkId);
    if (errEl) { errEl.style.display = 'block'; setTimeout(() => errEl.style.display = 'none', 2500); }
    return;
  }
  saveSpecLinks(id, getSpecLinks(id).map(lk =>
    lk.id === linkId ? { ...lk, url: url.trim(), label: label.trim() } : lk));
  delete _specEditMode[id + '::' + linkId];
  renderDesignSpecTab(id);
  showToast();
}

function cancelSpecLink(id, linkId) {
  const list = getSpecLinks(id);
  const entry = list.find(lk => lk.id === linkId);
  if (entry && !entry.url) saveSpecLinks(id, list.filter(lk => lk.id !== linkId));
  delete _specEditMode[id + '::' + linkId];
  renderDesignSpecTab(id);
}

function deleteSpecLink(id, linkId) {
  if (!confirm('Remove this spec link?')) return;
  saveSpecLinks(id, getSpecLinks(id).filter(lk => lk.id !== linkId));
  delete _specEditMode[id + '::' + linkId];
  renderDesignSpecTab(id);
}

function renderDesignSpecTab(id) {
  const panel = document.getElementById(id + '_spec_panel');
  if (!panel) return;
  const specLinks = getSpecLinks(id);
  const f = getAllFeatures().find(x => x.id === id);

  // Built-in design spec document (features with hasDoc + docLabel 'Design Spec')
  const hasBuiltinSpec = f && f.hasDoc && (f.docLabel === 'Design Spec' || !f.docLabel);
  const builtinHtml = hasBuiltinSpec ? `<div class="context-card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <h3 style="margin-bottom:0"><span class="material-symbols-rounded ctx-icon">description</span> Spec Document</h3>
      ${f.docSrc ? `<a href="${escHtml(f.docSrc)}" target="_blank" class="link-chip" style="font-size:11px">
        <span class="material-symbols-rounded" style="font-size:12px">open_in_new</span> Open full screen
      </a>` : ''}
    </div>
    ${f.docSrc
      ? `<iframe src="${escHtml(f.docSrc)}" style="width:100%;height:80vh;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;" title="${escHtml(f.title)} spec"></iframe>`
      : `<div id="${escHtml('spc_builtin_' + id)}"></div>`
    }
  </div>` : '';

  const linksHtml = specLinks.map(lk => {
    const ek = id + '::' + lk.id;
    if (_specEditMode[ek]) {
      return `<div class="context-card">
        <div style="display:flex;flex-direction:column;gap:8px">
          <input class="add-item-input" id="sl_lbl_${id}_${lk.id}" value="${escHtml(lk.label)}" placeholder="Label (e.g. Mobile Spec, GitHub README)…" />
          <input class="add-item-input" id="sl_url_${id}_${lk.id}" value="${escHtml(lk.url)}" placeholder="https://github.com/…, figma.com, Zeplin, Storybook…" />
          <div id="sl_err_${id}_${lk.id}" class="input-error" style="display:none">Please enter a valid https:// URL</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary" style="font-size:12px;padding:5px 14px" onclick="saveSpecLink('${id}','${lk.id}')">Save</button>
            <button class="btn" style="font-size:12px;padding:5px 14px" onclick="cancelSpecLink('${id}','${lk.id}')">Cancel</button>
          </div>
        </div>
      </div>`;
    }
    const isGithub = toGithubRawUrl(lk.url) !== null;
    const sourceTag = isGithub
      ? `<span style="font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:2px 6px">GitHub</span>`
      : '';
    return `<div class="context-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">
        <div style="min-width:0;flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${lk.label ? `<span style="font-size:13px;font-weight:600;color:var(--text)">${escHtml(lk.label)}</span>` : ''}
          ${sourceTag}
          <a href="${escHtml(lk.url)}" target="_blank" class="link-chip" style="max-width:280px;overflow:hidden">
            <span class="material-symbols-rounded" style="font-size:12px;flex-shrink:0">open_in_new</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(lk.url)}</span>
          </a>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button class="q-icon-btn" title="Edit" onclick="editSpecLink('${id}','${lk.id}')">
            <span class="material-symbols-rounded">edit</span>
          </button>
          <button class="q-icon-btn del" title="Remove" onclick="deleteSpecLink('${id}','${lk.id}')">
            <span class="material-symbols-rounded">delete</span>
          </button>
        </div>
      </div>
      <div id="${_specContentId(id, lk.id)}">
        <div class="spec-loading"><span class="material-symbols-rounded">progress_activity</span>Loading…</div>
      </div>
    </div>`;
  }).join('');

  const isEmpty = !hasBuiltinSpec && !specLinks.length;

  if (isEmpty) {
    panel.innerHTML = `<div class="context-card" style="text-align:center;padding:48px 20px">
      <span class="material-symbols-rounded" style="font-size:40px;color:var(--text-dim);display:block;margin-bottom:10px">description</span>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">No spec links yet.<br>Supports GitHub files, Figma, Zeplin, Storybook…</div>
      <button class="btn btn-primary" style="font-size:12px;padding:6px 16px" onclick="addSpecLink('${id}')">+ Add Spec Link</button>
    </div>`;
  } else {
    panel.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--text)">Design Spec</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:2px">Link Figma, GitHub files, Zeplin, Storybook, or any spec document</div>
        </div>
        <button class="btn btn-primary" style="display:flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;flex-shrink:0" onclick="addSpecLink('${id}')">
          <span class="material-symbols-rounded" style="font-size:14px">add</span> Add Link
        </button>
      </div>
      ${builtinHtml}
      ${linksHtml}`;
  }

  // Async: render content for each user-added spec link
  specLinks.filter(lk => lk.url && !_specEditMode[id + '::' + lk.id]).forEach(lk => {
    renderSpecContent(id, lk.id, lk.url);
  });

  // Async: render built-in markdown spec doc (for features with no docSrc)
  if (hasBuiltinSpec && f && !f.docSrc) {
    const builtinEl = document.getElementById('spc_builtin_' + id);
    if (builtinEl) {
      const rawEl = document.getElementById('doc-' + id);
      const saved = getFeatureState(id).doc;
      const raw = saved || (rawEl ? rawEl.textContent.trim() : '');
      builtinEl.innerHTML = raw
        ? `<div class="md-body">${marked.parse(raw)}</div>`
        : `<div style="font-size:13px;color:var(--text-dim);padding:8px 0">No spec document yet.</div>`;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('fh_theme', next);
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = next === 'dark' ? 'light_mode' : 'dark_mode';
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  const savedTheme = localStorage.getItem('fh_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  const themeIcon = document.getElementById('theme-icon');
  if (themeIcon) themeIcon.textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';

  renderSidebar();
  renderFeatureViews();
  renderScheduleCards();
  renderDeletedFeaturesSection();
  renderAllSections();
  renderAllDesignImgs();
  renderDocs();
  renderDomainDocs();

  const lastUpdated = document.getElementById('last-updated');
  const saved = localStorage.getItem('fh_state');
  if (saved) {
    lastUpdated.textContent = new Date().toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    });
  } else {
    lastUpdated.textContent = 'Mar 11, 2026';
  }
}

init();
</script>
