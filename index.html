// ═══════════════════════════════════════════════════════════════
//  INTERACTIVITY
// ═══════════════════════════════════════════════════════════════
function switchTab(featureId, tabName, el) {
  const allTabs = el.closest('.tabs').querySelectorAll('.tab');
  allTabs.forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const panels = ['context','todo','done','questions','notes','design','docs','ddocs','calls','handoff'];
  panels.forEach(p => {
    const panel = document.getElementById(`${featureId}_tab_${p}`);
    if (panel) panel.classList.toggle('active', p === tabName);
  });
}

function handleCheck(featureId, index, value) {
  setChecked(featureId, index, value);
  const label = document.querySelector(`label[for="${featureId}_todo_${index}"]`);
  if (label) label.classList.toggle('done', value);
  renderScheduleCards();
}

function handleNotes(featureId, value) {
  setNotes(featureId, value);
}

function toggleStepEdit(featureId) {
  const editor = document.getElementById(`${featureId}_step_editor`);
  const isHidden = editor.style.display === 'none';
  editor.style.display = isHidden ? 'block' : 'none';
  if (isHidden) document.getElementById(`${featureId}_step_input`).focus();
}

function saveStep(featureId) {
  const val = document.getElementById(`${featureId}_step_input`).value.trim();
  if (!val) return;
  setCurrentStep(featureId, val);
  document.getElementById(`${featureId}_step_display`).textContent = val;
  document.getElementById(`${featureId}_step_editor`).style.display = 'none';
  renderScheduleCards();
}

// ═══════════════════════════════════════════════════════════════
//  DYNAMIC STATE HELPERS
// ═══════════════════════════════════════════════════════════════
function getStatus(f) { return getFeatureState(f.id).status || f.status; }
function getDue(f)    { return getFeatureState(f.id).due    || f.due;    }

function handleStatusChange(featureId, val) {
  updateFeatureState(featureId, { status: val });
  const sel = document.getElementById(`${featureId}_status_sel`);
  if (sel) sel.className = `status-select ${STATUS_BADGE[val] || 'badge-done'}`;
  const navBadge = document.querySelector(`[data-feature="${featureId}"] .nav-badge`);
  if (navBadge) { navBadge.className = `badge nav-badge ${STATUS_BADGE[val] || 'badge-done'}`; navBadge.textContent = val; }
  renderScheduleCards();
}

function handleDueChange(featureId, val) {
  updateFeatureState(featureId, { due: val || 'TBD' });
  renderScheduleCards();
}

// ── TODO ──────────────────────────────────────────────────────
function renderTodoList(featureId) {
  const f = FEATURES.find(x => x.id === featureId);
  const el = document.getElementById(`${featureId}_todo_list`);
  if (!f || !el) return;
  const checked = getChecked(featureId);
  const custom = getFeatureState(featureId).customTodo || [];
  const base = f.todo.map((item, i) => {
    const done = !!checked[i];
    return `<li class="check-item">
      <input type="checkbox" id="${featureId}_td_${i}" ${done?'checked':''} onchange="handleCheck('${featureId}',${i},this.checked)"/>
      <label class="check-label${done?' done':''}" for="${featureId}_td_${i}">${item}</label>
    </li>`;
  }).join('');
  const offset = f.todo.length;
  const extra = custom.map((item, i) => {
    const idx = offset + i; const done = !!checked[idx];
    return `<li class="check-item">
      <input type="checkbox" id="${featureId}_td_${idx}" ${done?'checked':''} onchange="handleCheck('${featureId}',${idx},this.checked)"/>
      <label class="check-label${done?' done':''}" for="${featureId}_td_${idx}">${item}</label>
      <button class="remove-btn" onclick="removeCustomTodo('${featureId}',${i})">×</button>
    </li>`;
  }).join('');
  el.innerHTML = (base + extra) || `<li style="padding:8px 0;color:var(--text-dim);font-size:13px">No tasks yet.</li>`;
}

function addTodo(featureId) {
  const inp = document.getElementById(`${featureId}_add_todo`);
  const text = inp.value.trim(); if (!text) return;
  const items = [...(getFeatureState(featureId).customTodo || []), text];
  updateFeatureState(featureId, { customTodo: items }); inp.value = '';
  renderTodoList(featureId); renderScheduleCards();
}

function removeCustomTodo(featureId, i) {
  const items = (getFeatureState(featureId).customTodo || []).filter((_,j) => j !== i);
  updateFeatureState(featureId, { customTodo: items });
  renderTodoList(featureId); renderScheduleCards();
}

// ── DONE ──────────────────────────────────────────────────────
function renderDoneList(featureId) {
  const f = FEATURES.find(x => x.id === featureId);
  const el = document.getElementById(`${featureId}_done_list`);
  if (!f || !el) return;
  const custom = getFeatureState(featureId).customDone || [];
  const base = f.done.map(d => `<li class="done-item"><span>${d}</span></li>`).join('');
  const extra = custom.map((item, i) => `<li class="done-item" style="justify-content:space-between">
    <span>${item}</span><button class="remove-btn" onclick="removeCustomDone('${featureId}',${i})">×</button>
  </li>`).join('');
  el.innerHTML = (base + extra) || `<li style="padding:8px 0;color:var(--text-dim);font-size:13px">Nothing completed yet.</li>`;
}

function addDone(featureId) {
  const inp = document.getElementById(`${featureId}_add_done`);
  const text = inp.value.trim(); if (!text) return;
  const items = [...(getFeatureState(featureId).customDone || []), text];
  updateFeatureState(featureId, { customDone: items }); inp.value = '';
  renderDoneList(featureId);
}

function removeCustomDone(featureId, i) {
  const items = (getFeatureState(featureId).customDone || []).filter((_,j) => j !== i);
  updateFeatureState(featureId, { customDone: items });
  renderDoneList(featureId);
}

// ── QUESTIONS ─────────────────────────────────────────────────
function renderQuestionsList(featureId) {
  const f = FEATURES.find(x => x.id === featureId);
  const el = document.getElementById(`${featureId}_q_list`);
  if (!f || !el) return;
  const st = getFeatureState(featureId);
  const resolvedBase = st.resolvedBase || {};
  const resolvedCustom = st.resolvedCustom || {};
  const custom = st.customQuestions || [];

  const baseHtml = f.questions.map((q, i) => {
    const res = !!resolvedBase[i];
    return `<div class="question-card" style="${res?'opacity:.4':''}">
      <p style="${res?'text-decoration:line-through':''}">${q}</p>
      <div class="question-actions">
        <button class="resolve-btn${res?' resolved':''}" onclick="${res?`unresolveQ('${featureId}','base',${i})`:`resolveQ('${featureId}','base',${i})`}">
          ${res?'Reopen':'Mark resolved'}
        </button>
      </div>
    </div>`;
  }).join('');

  const customHtml = custom.map((q, i) => {
    const res = !!resolvedCustom[i];
    return `<div class="question-card" style="${res?'opacity:.4':''}">
      <p style="${res?'text-decoration:line-through':''}">${q}</p>
      <div class="question-actions">
        <button class="resolve-btn${res?' resolved':''}" onclick="${res?`unresolveQ('${featureId}','custom',${i})`:`resolveQ('${featureId}','custom',${i})`}">
          ${res?'Reopen':'Mark resolved'}
        </button>
        <button class="remove-btn" onclick="removeCustomQ('${featureId}',${i})">×</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = (baseHtml + customHtml) || `<div class="empty-state"><h3>No open questions</h3><p>Everything is resolved!</p></div>`;
}

function resolveQ(featureId, type, i) {
  const key = type === 'base' ? 'resolvedBase' : 'resolvedCustom';
  const r = { ...(getFeatureState(featureId)[key] || {}), [i]: true };
  updateFeatureState(featureId, { [key]: r }); renderQuestionsList(featureId);
}
function unresolveQ(featureId, type, i) {
  const key = type === 'base' ? 'resolvedBase' : 'resolvedCustom';
  const r = { ...(getFeatureState(featureId)[key] || {}) }; delete r[i];
  updateFeatureState(featureId, { [key]: r }); renderQuestionsList(featureId);
}
function addQuestion(featureId) {
  const inp = document.getElementById(`${featureId}_add_q`);
  const text = inp.value.trim(); if (!text) return;
  const items = [...(getFeatureState(featureId).customQuestions || []), text];
  updateFeatureState(featureId, { customQuestions: items }); inp.value = '';
  renderQuestionsList(featureId);
}
function removeCustomQ(featureId, i) {
  const items = (getFeatureState(featureId).customQuestions || []).filter((_,j) => j !== i);
  updateFeatureState(featureId, { customQuestions: items }); renderQuestionsList(featureId);
}

function getFigmaLink(id) {
  const s = loadState(); return (s[id] && s[id].figma) || '';
}
function saveFigmaLink(id, val) {
  updateFeatureState(id, { figma: val });
  const a = document.getElementById(id + '_figma_open');
  if (a) { a.href = val; a.style.display = val ? 'inline-flex' : 'none'; }
}
function getDesignNotes(id) {
  const s = loadState(); return (s[id] && s[id].dnotes) || '';
}
function saveDesignNotes(id, val) {
  updateFeatureState(id, { dnotes: val });
  showToast();
}
function getDesignImgs(id) {
  const s = loadState(); return (s[id] && s[id].dimgs) || [];
}
function addDesignImg(id) {
  const inp = document.getElementById(id + '_add_img');
  const url = inp.value.trim(); if (!url) return;
  const imgs = getDesignImgs(id);
  imgs.push(url);
  updateFeatureState(id, { dimgs: imgs });
  inp.value = '';
  renderDesignImgs(id);
  showToast();
}
function removeDesignImg(id, i) {
  const imgs = getDesignImgs(id);
  imgs.splice(i, 1);
  updateFeatureState(id, { dimgs: imgs });
  renderDesignImgs(id);
}
function renderDesignImgs(id) {
  const el = document.getElementById(id + '_design_imgs');
  if (!el) return;
  const imgs = getDesignImgs(id);
  el.innerHTML = imgs.length ? imgs.map((url, i) => `
    <div class="design-img-card">
      <img src="${url}" onerror="this.style.display='none'" />
      <div class="img-url">${url}</div>
      <button class="img-remove" onclick="removeDesignImg('${id}',${i})">✕</button>
    </div>`).join('') : '';
}
function renderAllDesignImgs() {
  FEATURES.forEach(f => renderDesignImgs(f.id));
}

function renderAllSections() {
  FEATURES.forEach(f => {
    renderTodoList(f.id);
    renderDoneList(f.id);
    renderQuestionsList(f.id);
    renderCallsList(f.id);
  });
}

// ═══════════════════════════════════════════════════════════════
//  DOCS RENDERING
// ═══════════════════════════════════════════════════════════════
function renderDocs() {
  FEATURES.filter(f => f.hasDoc).forEach(f => {
    const container = document.getElementById(`${f.id}_docs_view`);
    if (!container) return;

    // Iframe doc (full standalone HTML file)
    if (f.docSrc) {
      container.innerHTML = `
        <div class="doc-toolbar">
          <div class="doc-toolbar-left">Design spec · <a href="${f.docSrc}" target="_blank" class="link-chip" style="display:inline-flex">↗ Open full screen</a></div>
        </div>
        <iframe src="${f.docSrc}" style="width:100%;height:80vh;border:1px solid var(--border);border-radius:var(--radius);background:#fff;" title="${f.title} spec"></iframe>`;
      return;
    }

    // Markdown doc
    const rawEl = document.getElementById(`doc-${f.id}`);
    const savedDoc = getFeatureState(f.id).doc;
    const raw = savedDoc || (rawEl ? rawEl.textContent.trim() : null);

    if (raw) {
      container.innerHTML = `
        <div class="doc-toolbar">
          <div class="doc-toolbar-left">${f.docLabel || 'Docs'} · paste new content below to update</div>
          <button class="btn" onclick="toggleDocEdit('${f.id}')">Edit Doc</button>
        </div>
        <div id="${f.id}_doc_editor" style="display:none;margin-bottom:20px;">
          <textarea class="doc-paste-area" id="${f.id}_doc_input" style="display:block"
            placeholder="Paste raw markdown here...">${raw}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-primary" onclick="saveDoc('${f.id}')">Save</button>
            <button class="btn" onclick="toggleDocEdit('${f.id}')">Cancel</button>
          </div>
        </div>
        <div class="context-card">
          <div class="md-body" id="${f.id}_md_output">${marked.parse(raw)}</div>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="doc-empty">
          <h3>No domain doc yet</h3>
          <p>Paste any markdown content from Glean below to add it here.</p>
          <textarea class="doc-paste-area" id="${f.id}_doc_input" style="display:block;text-align:left"
            placeholder="Paste raw markdown here..."></textarea>
          <div style="margin-top:10px">
            <button class="btn btn-primary" onclick="saveDoc('${f.id}')">Add Doc</button>
          </div>
        </div>`;
    }
  });
}

function renderDomainDocs() {
  FEATURES.filter(f => f.hasDomainDoc).forEach(f => {
    const container = document.getElementById(`${f.id}_ddocs_view`);
    if (!container) return;
    const rawEl = document.getElementById(`ddoc-${f.id}`);
    const raw = getFeatureState(f.id).ddoc || (rawEl ? rawEl.textContent.trim() : null);
    if (raw) {
      container.innerHTML = `
        <div class="context-card">
          <div class="md-body">${marked.parse(raw)}</div>
        </div>`;
    } else {
      container.innerHTML = `<div class="doc-empty"><h3>No domain doc yet</h3><p>Add a <code>ddoc-${f.id}</code> script element with markdown content.</p></div>`;
    }
  });
}

function toggleDocEdit(featureId) {
  const editor = document.getElementById(`${featureId}_doc_editor`);
  if (!editor) return;
  editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
}

function saveDoc(featureId) {
  const input = document.getElementById(`${featureId}_doc_input`);
  if (!input) return;
  const raw = input.value.trim();
  if (!raw) return;

  // Persist to localStorage
  updateFeatureState(featureId, { doc: raw });

  // Re-render the markdown output
  const output = document.getElementById(`${featureId}_md_output`);
  if (output) {
    output.innerHTML = marked.parse(raw);
    toggleDocEdit(featureId);
  } else {
    // First time save — re-render whole docs view
    const rawEl = document.getElementById(`doc-${featureId}`);
    if (rawEl) rawEl.textContent = raw;
    renderDocs();
  }
}

// ═══════════════════════════════════════════════════════════════
//  CUSTOMER CALLS
// ═══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getCalls(featureId) {
  return getFeatureState(featureId).calls || [];
}

function saveCalls(featureId, calls) {
  updateFeatureState(featureId, { calls });
}

function addCall(featureId) {
  const calls = getCalls(featureId);
  saveCalls(featureId, [...calls, {
    id: Date.now().toString(),
    label: '',
    date: '',
    link: '',
    transcript: '',
    summary: '',
  }]);
  renderCallsList(featureId);
}

function removeCall(featureId, callId) {
  saveCalls(featureId, getCalls(featureId).filter(c => c.id !== callId));
  renderCallsList(featureId);
}

function updateCallField(featureId, callId, field, value) {
  const calls = getCalls(featureId).map(c =>
    c.id === callId ? { ...c, [field]: value } : c
  );
  saveCalls(featureId, calls);
}

function renderCallsList(featureId) {
  const el = document.getElementById(`${featureId}_calls_list`);
  if (!el) return;
  const calls = getCalls(featureId);
  if (!calls.length) {
    el.innerHTML = `<div class="empty-state" style="padding:40px 20px">
      <h3>No customer calls yet</h3>
      <p>Click "+ Add Call" to track a call link, paste a transcript, and generate an AI summary.</p>
    </div>`;
    return;
  }
  el.innerHTML = calls.map(call => buildCallCard(featureId, call)).join('');
}

function buildCallCard(featureId, call) {
  const hasLink = !!call.link.trim();
  const hasSummary = !!(call.summary && call.summary.trim());
  return `
  <div class="call-card">
    <div class="call-card-header">
      <div class="call-card-title">
        📞
        <input
          value="${escHtml(call.label)}"
          placeholder="Call label (e.g. SmartCare Discovery)"
          onblur="updateCallField('${featureId}','${call.id}','label',this.value)" />
      </div>
      <input class="call-date-input"
        value="${escHtml(call.date)}"
        placeholder="Date (e.g. Jan 23, 2026)"
        onblur="updateCallField('${featureId}','${call.id}','date',this.value)" />
      <button class="remove-btn" style="font-size:17px" title="Remove call"
        onclick="removeCall('${featureId}','${call.id}')">×</button>
    </div>

    <div class="call-section-label">Call Recording Link</div>
    <div class="call-link-row">
      <input
        value="${escHtml(call.link)}"
        placeholder="Paste Gong, Fathom, or Zoom URL…"
        onblur="updateCallField('${featureId}','${call.id}','link',this.value)" />
      ${hasLink ? `<a class="link-chip" href="${escHtml(call.link)}" target="_blank" style="white-space:nowrap">↗ Open</a>` : ''}
    </div>

    <div class="call-divider"></div>

    <div>
      <div class="call-section-label">Transcript</div>
      <textarea class="call-transcript"
        placeholder="Paste the raw transcript here…"
        onblur="updateCallField('${featureId}','${call.id}','transcript',this.value)">${escHtml(call.transcript)}</textarea>
    </div>

    <div class="summary-section">
      <div class="summary-actions">
        <div class="call-section-label" style="margin-bottom:0">AI Summary</div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <button class="generate-btn" id="gen_${call.id}"
            onclick="copyPromptForAI('${featureId}','${call.id}')">
            ✦ Copy prompt → Claude.ai
          </button>
          <span id="summary_btns_${call.id}"
            style="display:${hasSummary ? 'flex' : 'none'};gap:6px;align-items:center">
            <button class="btn" style="font-size:11px;padding:5px 10px"
              onclick="copySummary('${featureId}','${call.id}')">Copy</button>
            <button class="btn" style="font-size:11px;padding:5px 10px"
              onclick="expandSummary('${featureId}','${call.id}')">⤢ Expand</button>
            <button class="btn" style="font-size:11px;padding:5px 10px"
              id="edit_summary_btn_${call.id}"
              onclick="toggleSummaryEdit('${featureId}','${call.id}')">Edit</button>
          </span>
        </div>
      </div>
      <div id="summary_rendered_${call.id}" class="summary-rendered md-body"
        style="display:${hasSummary ? 'block' : 'none'}">${hasSummary ? marked.parse(call.summary) : ''}</div>
      <textarea class="call-summary" id="summary_ta_${call.id}"
        placeholder="Paste a summary here, or use the button above to generate one via Claude.ai…"
        style="display:${hasSummary ? 'none' : 'block'}"
        onblur="saveSummaryFromBlur('${featureId}','${call.id}')">${escHtml(call.summary)}</textarea>
    </div>
  </div>`;
}

// ── SUMMARY VIEW / EDIT ────────────────────────────────────────
const _summaryBlurLock = {};

function saveSummaryFromBlur(featureId, callId) {
  const ta = document.getElementById(`summary_ta_${callId}`);
  if (!ta || ta.style.display === 'none') return;
  const val = ta.value;
  updateCallField(featureId, callId, 'summary', val);
  if (!val.trim()) return;

  // Switch to rendered view
  const rendered = document.getElementById(`summary_rendered_${callId}`);
  if (rendered) { rendered.innerHTML = marked.parse(val); rendered.style.display = 'block'; }
  ta.style.display = 'none';

  const btns = document.getElementById(`summary_btns_${callId}`);
  if (btns) btns.style.display = 'flex';

  const editBtn = document.getElementById(`edit_summary_btn_${callId}`);
  if (editBtn) editBtn.textContent = 'Edit';

  // Block the immediately-following button click from re-entering edit mode
  _summaryBlurLock[callId] = true;
  setTimeout(() => { _summaryBlurLock[callId] = false; }, 200);
}

function toggleSummaryEdit(featureId, callId) {
  if (_summaryBlurLock[callId]) { _summaryBlurLock[callId] = false; return; }
  const ta = document.getElementById(`summary_ta_${callId}`);
  const rendered = document.getElementById(`summary_rendered_${callId}`);
  const editBtn = document.getElementById(`edit_summary_btn_${callId}`);
  if (!ta) return;

  const isEditing = ta.style.display !== 'none';
  if (isEditing) {
    // Save and switch to rendered
    const val = ta.value;
    updateCallField(featureId, callId, 'summary', val);
    if (rendered) { rendered.innerHTML = marked.parse(val); rendered.style.display = 'block'; }
    ta.style.display = 'none';
    if (editBtn) editBtn.textContent = 'Edit';
  } else {
    // Switch to edit mode
    if (rendered) rendered.style.display = 'none';
    ta.style.display = 'block';
    ta.focus();
    if (editBtn) editBtn.textContent = 'Done';
  }
}

function copySummary(featureId, callId) {
  const call = getCalls(featureId).find(c => c.id === callId);
  if (!call) return;
  navigator.clipboard.writeText(call.summary || '').then(() => showToast());
}

function expandSummary(featureId, callId) {
  const call = getCalls(featureId).find(c => c.id === callId);
  if (!call || !call.summary) return;
  const modal = document.getElementById('summary-modal');
  const content = document.getElementById('summary-modal-content');
  const title = document.getElementById('summary-modal-title');
  modal.dataset.summary = call.summary;
  if (title) title.textContent = call.label ? `${call.label}${call.date ? '  ·  ' + call.date : ''}` : 'Call Summary';
  if (content) content.innerHTML = marked.parse(call.summary);
  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeSummaryModal() {
  document.getElementById('summary-modal').style.display = 'none';
  document.body.style.overflow = '';
}

function copySummaryFromModal() {
  const modal = document.getElementById('summary-modal');
  navigator.clipboard.writeText(modal.dataset.summary || '').then(() => showToast());
}

// ── AI SUMMARY VIA CLIPBOARD ───────────────────────────────────
function copyPromptForAI(featureId, callId) {
  const call = getCalls(featureId).find(c => c.id === callId);
  if (!call) return;

  if (!call.transcript.trim()) {
    alert('Paste a transcript first, then click the button.');
    return;
  }

  const f = FEATURES.find(x => x.id === featureId);

  const prompt = `You are a product design assistant at BuildOps summarizing a customer discovery call for a Staff Product Designer.

Feature being discussed: "${f ? f.title : featureId}"
${f && f.summary ? `Feature context: ${f.summary}` : ''}

Analyze the transcript below and return a structured summary with these sections:

**Key Pain Points** — specific problems the customer described (include direct quotes where impactful)
**Key Insights** — findings that inform design or product decisions
**Validated / Challenged Assumptions** — what confirmed or changed existing thinking
**Open Questions** — unresolved items that need follow-up
**Action Items** — concrete next steps mentioned

Be concise and direct. Use bullet points. Preserve impactful quotes verbatim.

---
TRANSCRIPT:
${call.transcript}`;

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.getElementById(`gen_${callId}`);
    if (btn) {
      btn.textContent = '✓ Copied! Paste into Claude.ai';
      btn.style.background = 'var(--green-bg)';
      btn.style.color = 'var(--green)';
      btn.style.borderColor = 'var(--green)';
      setTimeout(() => {
        btn.textContent = '✦ Copy prompt → Claude.ai';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 3000);
    }
    window.open('https://claude.ai', '_blank');
  }).catch(() => {
    alert('Could not copy to clipboard. Try selecting and copying the transcript manually.');
  });
}

// ═══════════════════════════════════════════════════════════════
//  DESIGN HANDOFF
// ═══════════════════════════════════════════════════════════════

function getHandoffScreens(featureId) {
  return getFeatureState(featureId).handoffScreens || null;
}

function saveHandoffScreens(featureId, screens) {
  updateFeatureState(featureId, { handoffScreens: screens });
}

function initHandoffScreens(featureId) {
  let screens = getHandoffScreens(featureId);
  if (!screens) {
    const f = FEATURES.find(x => x.id === featureId);
    screens = (f ? (f.todo || []) : []).map((label, i) => ({
      id: `screen-${Date.now()}-${i}`,
      label,
      imageData: null,
      pins: [],
      drawingData: null,
    }));
    saveHandoffScreens(featureId, screens);
  }
  return screens;
}

function renderHandoff(featureId) {
  const container = document.getElementById(`${featureId}_handoff_body`);
  if (!container) return;
  const screens = initHandoffScreens(featureId);
  const attached = screens.filter(s => s.imageData).length;
  container.innerHTML = `
    <div class="handoff-header">
      <div style="font-size:12px;color:var(--text-muted)">${screens.length} screen${screens.length !== 1 ? 's' : ''} &nbsp;·&nbsp; ${attached} attached</div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="addHandoffScreen('${featureId}')">+ Add Screen</button>
        <button class="export-btn" onclick="exportHandoff('${featureId}')">&#8599; Export Handoff</button>
      </div>
    </div>
    <div class="screen-grid">
      ${screens.map(s => buildScreenCard(featureId, s)).join('')}
    </div>
  `;
}

function buildScreenCard(featureId, screen) {
  const hasImage = !!screen.imageData;
  const pinCount = (screen.pins || []).length;
  const pinsOverlay = (screen.pins || []).map((pin, pi) => `
    <div style="position:absolute;left:${pin.x*100}%;top:${pin.y*100}%;transform:translate(-50%,-100%) rotate(-45deg);width:16px;height:16px;background:var(--accent);border:1.5px solid white;border-radius:50% 50% 50% 0;display:flex;align-items:center;justify-content:center;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.5)">
      <span style="transform:rotate(45deg);font-size:8px;font-weight:700;color:white">${pi+1}</span>
    </div>`).join('');
  // Use composite (image + drawing merged) if available, else raw image
  const previewSrc = screen.compositeData || screen.imageData;
  const preview = hasImage
    ? `<div style="position:relative;width:100%;height:100%">
        <img src="${previewSrc}" alt="${screen.label}" style="width:100%;height:100%;object-fit:cover;display:block" />
        ${pinsOverlay}
      </div>`
    : `<div class="upload-placeholder"><div class="ph-icon">&#128444;</div><div>Click to attach design</div></div>`;
  return `
    <div class="screen-card">
      <div class="screen-card-header">
        <div class="screen-card-label" title="${screen.label}">${screen.label}</div>
        <span class="screen-card-status ${hasImage ? 'screen-status-attached' : 'screen-status-pending'}">${hasImage ? 'Attached' : 'Pending'}</span>
      </div>
      <div class="screen-card-preview" onclick="${hasImage ? `openAnnotator('${featureId}','${screen.id}')` : `triggerImageUpload('${screen.id}')`}">
        ${preview}
      </div>
      <div class="screen-card-actions">
        <button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="triggerImageUpload('${screen.id}')">Upload</button>
        ${hasImage ? `<button class="btn" style="font-size:11px;padding:4px 10px" onclick="openAnnotator('${featureId}','${screen.id}')">Annotate</button>` : ''}
        <button class="btn" style="font-size:11px;padding:4px 10px;margin-left:auto;color:var(--red)" onclick="removeHandoffScreen('${featureId}','${screen.id}')">&#10005;</button>
      </div>
      <input type="file" accept="image/*" id="upload-${screen.id}" style="display:none"
        onchange="handleImageUpload(event,'${featureId}','${screen.id}')" />
    </div>`;
}

function triggerImageUpload(screenId) {
  document.getElementById(`upload-${screenId}`).click();
}

function handleImageUpload(event, featureId, screenId) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const screens = getHandoffScreens(featureId);
    const idx = screens.findIndex(s => s.id === screenId);
    if (idx === -1) return;
    screens[idx].imageData = e.target.result;
    saveHandoffScreens(featureId, screens);
    renderHandoff(featureId);
  };
  reader.readAsDataURL(file);
}

function addHandoffScreen(featureId) {
  const label = prompt('Screen name:');
  if (!label || !label.trim()) return;
  const screens = getHandoffScreens(featureId) || [];
  screens.push({ id: `screen-${Date.now()}`, label: label.trim(), imageData: null, pins: [], drawingData: null });
  saveHandoffScreens(featureId, screens);
  renderHandoff(featureId);
}

function removeHandoffScreen(featureId, screenId) {
  if (!confirm('Remove this screen?')) return;
  const screens = (getHandoffScreens(featureId) || []).filter(s => s.id !== screenId);
  saveHandoffScreens(featureId, screens);
  renderHandoff(featureId);
}

// ── ANNOTATOR ─────────────────────────────────────────────────
let _annotFeatureId = null, _annotScreenId = null;
let _annotTool = 'pin';
let _annotDrawing = false, _annotCtx = null;
let _activePinPopup = null;

function openAnnotator(featureId, screenId) {
  const screens = getHandoffScreens(featureId);
  const screen = screens.find(s => s.id === screenId);
  if (!screen || !screen.imageData) return;
  _annotFeatureId = featureId;
  _annotScreenId = screenId;
  const overlay = document.getElementById('annotator-overlay');
  document.getElementById('annotator-title').textContent = screen.label;
  const img = document.getElementById('annotator-img');
  img.src = screen.imageData;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  img.onload = () => {
    const canvas = document.getElementById('annotator-canvas');
    canvas.width = img.offsetWidth;
    canvas.height = img.offsetHeight;
    _annotCtx = canvas.getContext('2d');
    if (screen.drawingData) {
      const di = new Image();
      di.onload = () => _annotCtx.drawImage(di, 0, 0);
      di.src = screen.drawingData;
    } else {
      _annotCtx.clearRect(0, 0, canvas.width, canvas.height);
    }
    renderAnnotPins(screen.pins || []);
    setAnnotTool('pin');
  };
  if (img.complete && img.naturalWidth) img.onload();
}

function closeAnnotator() {
  document.getElementById('annotator-overlay').classList.remove('open');
  document.body.style.overflow = '';
  closeActivePinPopup();
  _annotFeatureId = null;
  _annotScreenId = null;
}

function setAnnotTool(tool) {
  _annotTool = tool;
  const canvas = document.getElementById('annotator-canvas');
  const pinLayer = document.getElementById('annotator-pin-layer');
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  if (tool === 'draw') {
    canvas.style.pointerEvents = 'auto';
    canvas.style.cursor = 'crosshair';
    pinLayer.classList.remove('pin-mode');
  } else {
    canvas.style.pointerEvents = 'none';
    canvas.style.cursor = '';
    pinLayer.classList.toggle('pin-mode', tool === 'pin');
  }
}

function annotMouseDown(e) {
  if (_annotTool !== 'draw') return;
  _annotDrawing = true;
  const rect = e.target.getBoundingClientRect();
  _annotCtx.beginPath();
  _annotCtx.strokeStyle = '#6c7bff';
  _annotCtx.lineWidth = 2;
  _annotCtx.lineCap = 'round';
  _annotCtx.lineJoin = 'round';
  _annotCtx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
}

function annotMouseMove(e) {
  if (!_annotDrawing || _annotTool !== 'draw') return;
  const rect = e.target.getBoundingClientRect();
  _annotCtx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
  _annotCtx.stroke();
}

function annotMouseUp() { _annotDrawing = false; }

function annotPinClick(e) {
  if (_annotTool !== 'pin') return;
  if (e.target.closest('.pin-marker') || e.target.closest('.pin-popup')) return;
  closeActivePinPopup();
  const rect = e.currentTarget.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  showNewPinPopup(x, y, px, py);
}

function showNewPinPopup(xRatio, yRatio, px, py) {
  closeActivePinPopup();
  const pinLayer = document.getElementById('annotator-pin-layer');
  const popup = document.createElement('div');
  popup.className = 'pin-popup';
  popup.style.left = `${Math.min(px + 10, pinLayer.offsetWidth - 240)}px`;
  popup.style.top = `${Math.max(py - 10, 0)}px`;
  popup.innerHTML = `
    <div class="pin-note-label">Pin note</div>
    <textarea id="new-pin-note" placeholder="Describe this annotation..."></textarea>
    <div class="pin-popup-actions">
      <button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="saveNewPin(${xRatio},${yRatio})">Add Pin</button>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="closeActivePinPopup()">Cancel</button>
    </div>`;
  pinLayer.appendChild(popup);
  _activePinPopup = popup;
  popup.querySelector('textarea').focus();
}

function saveNewPin(x, y) {
  const note = document.getElementById('new-pin-note')?.value.trim() || '';
  closeActivePinPopup();
  const screens = getHandoffScreens(_annotFeatureId);
  const screen = screens.find(s => s.id === _annotScreenId);
  if (!screen) return;
  screen.pins = screen.pins || [];
  screen.pins.push({ id: Date.now(), x, y, note });
  saveHandoffScreens(_annotFeatureId, screens);
  renderAnnotPins(screen.pins);
}

function renderAnnotPins(pins) {
  const pinLayer = document.getElementById('annotator-pin-layer');
  pinLayer.querySelectorAll('.pin-marker').forEach(el => el.remove());
  pins.forEach((pin, i) => {
    const marker = document.createElement('div');
    marker.className = 'pin-marker';
    marker.style.left = `${pin.x * 100}%`;
    marker.style.top = `${pin.y * 100}%`;
    marker.innerHTML = `<span>${i + 1}</span>`;
    marker.title = pin.note || '';
    marker.onclick = e => { e.stopPropagation(); showExistingPinPopup(pin, i, marker); };
    pinLayer.appendChild(marker);
  });
}

function showExistingPinPopup(pin, idx, anchor) {
  closeActivePinPopup();
  const pinLayer = document.getElementById('annotator-pin-layer');
  const ar = anchor.getBoundingClientRect();
  const lr = pinLayer.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'pin-popup';
  popup.style.left = `${Math.min(ar.left - lr.left + 30, pinLayer.offsetWidth - 240)}px`;
  popup.style.top = `${Math.max(ar.top - lr.top - 10, 0)}px`;
  popup.innerHTML = `
    <div class="pin-note-label">Pin ${idx + 1}</div>
    <textarea id="edit-pin-${pin.id}">${pin.note || ''}</textarea>
    <div class="pin-popup-actions">
      <button class="btn btn-primary" style="font-size:11px;padding:4px 10px" onclick="updatePin(${pin.id})">Save</button>
      <button class="btn" style="font-size:11px;padding:4px 10px;color:var(--red)" onclick="deletePin(${pin.id})">Delete</button>
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="closeActivePinPopup()">&#10005;</button>
    </div>`;
  pinLayer.appendChild(popup);
  _activePinPopup = popup;
}

function updatePin(pinId) {
  const screens = getHandoffScreens(_annotFeatureId);
  const screen = screens.find(s => s.id === _annotScreenId);
  if (!screen) return;
  const pin = screen.pins.find(p => p.id === pinId);
  if (pin) {
    pin.note = document.getElementById(`edit-pin-${pinId}`)?.value || '';
    saveHandoffScreens(_annotFeatureId, screens);
  }
  closeActivePinPopup();
  renderAnnotPins(screen.pins);
}

function deletePin(pinId) {
  const screens = getHandoffScreens(_annotFeatureId);
  const screen = screens.find(s => s.id === _annotScreenId);
  if (!screen) return;
  screen.pins = screen.pins.filter(p => p.id !== pinId);
  saveHandoffScreens(_annotFeatureId, screens);
  closeActivePinPopup();
  renderAnnotPins(screen.pins);
}

function closeActivePinPopup() {
  if (_activePinPopup) { _activePinPopup.remove(); _activePinPopup = null; }
}

function clearAnnotDrawing() {
  if (!_annotCtx) return;
  const canvas = document.getElementById('annotator-canvas');
  _annotCtx.clearRect(0, 0, canvas.width, canvas.height);
}

function saveAnnotation() {
  const annotCanvas = document.getElementById('annotator-canvas');
  const annotImg = document.getElementById('annotator-img');
  const screens = getHandoffScreens(_annotFeatureId);
  const screen = screens.find(s => s.id === _annotScreenId);
  if (!screen) return;

  // Keep raw drawing for re-editing in the annotator
  screen.drawingData = annotCanvas.toDataURL();

  // Composite: merge original image + drawing into one image at display size
  // so the card preview shows them perfectly aligned
  const merge = document.createElement('canvas');
  merge.width = annotImg.offsetWidth;
  merge.height = annotImg.offsetHeight;
  const mCtx = merge.getContext('2d');
  mCtx.drawImage(annotImg, 0, 0, merge.width, merge.height);
  mCtx.drawImage(annotCanvas, 0, 0, merge.width, merge.height);
  screen.compositeData = merge.toDataURL();

  saveHandoffScreens(_annotFeatureId, screens);
  const fid = _annotFeatureId;
  closeAnnotator();
  renderHandoff(fid);
  showToast();
}

// ── EXPORT HANDOFF ────────────────────────────────────────────
function exportHandoff(featureId) {
  const f = FEATURES.find(x => x.id === featureId);
  const screens = getHandoffScreens(featureId) || [];
  const screensHtml = screens.map((screen, i) => {
    const imgHtml = screen.imageData
      ? `<div style="position:relative;display:inline-block;width:100%">
           <img src="${screen.imageData}" style="width:100%;display:block;border-radius:8px" />
           ${screen.drawingData ? `<img src="${screen.drawingData}" style="position:absolute;inset:0;width:100%;pointer-events:none;border-radius:8px" />` : ''}
           ${(screen.pins||[]).map((pin, pi) => `<div style="position:absolute;left:${pin.x*100}%;top:${pin.y*100}%;transform:translate(-50%,-100%) rotate(-45deg);width:26px;height:26px;background:#6c7bff;border:2px solid white;border-radius:50% 50% 50% 0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.5)"><span style="transform:rotate(45deg);font-size:10px;font-weight:700;color:white">${pi+1}</span></div>`).join('')}
         </div>`
      : `<div style="height:160px;background:#1a1d27;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#8b90a8;font-size:13px">No image attached yet</div>`;
    const pinsHtml = (screen.pins||[]).length
      ? `<div style="margin-top:14px">${(screen.pins||[]).map((pin, pi) => `<div style="display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #2a2f45;font-size:13px"><div style="background:#6c7bff;color:white;font-size:10px;font-weight:700;border-radius:50%;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center">${pi+1}</div><div style="color:#e2e4f0">${pin.note || '(no note)'}</div></div>`).join('')}</div>`
      : '';
    return `<div style="background:#1a1d27;border:1px solid #2a2f45;border-radius:10px;overflow:hidden;margin-bottom:24px">
      <div style="padding:12px 16px;border-bottom:1px solid #2a2f45;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:14px;font-weight:600;color:#e2e4f0">${i+1}. ${screen.label}</div>
        <span style="font-size:11px;padding:3px 10px;border-radius:20px;background:${screen.imageData?'#0d2e1f':'#2e2210'};color:${screen.imageData?'#3ecf8e':'#f5a623'};font-weight:600">${screen.imageData?'Attached':'Pending'}</span>
      </div>
      <div style="padding:16px">${imgHtml}${pinsHtml}</div>
    </div>`;
  }).join('');
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Design Handoff — ${f ? f.title : featureId}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e4f0;padding:40px 20px;max-width:960px;margin:0 auto}
</style>
</head>
<body>
  <div style="margin-bottom:32px">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6c7bff;font-weight:700;margin-bottom:6px">Design Handoff</div>
    <div style="font-size:24px;font-weight:700;margin-bottom:4px">${f ? f.icon+' '+f.title : featureId}</div>
    <div style="font-size:13px;color:#8b90a8;margin-bottom:16px">${f ? f.customer : ''} &nbsp;·&nbsp; ${screens.length} screen${screens.length!==1?'s':''} &nbsp;·&nbsp; Exported ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    ${f&&f.summary?`<div style="font-size:13px;color:#8b90a8;line-height:1.6;padding:14px;background:#1a1d27;border-radius:8px;border:1px solid #2a2f45">${f.summary}</div>`:''}
  </div>
  ${screensHtml}
  <div style="font-size:11px;color:#5a5f7a;margin-top:40px;text-align:center;padding-bottom:40px">Generated from Feature Context Hub</div>
</body>
</html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `handoff-${featureId}.html`; a.click();
  URL.revokeObjectURL(url);
  showToast();
}

function renderAllHandoffs() {
  FEATURES.forEach(f => renderHandoff(f.id));
}
